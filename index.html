<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymLog Pro - Elite Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #ffffff; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        .surface { background-color: #1e293b; border-radius: 2rem; border: 2px solid #334155; }
        .input-field { background-color: #334155; border-radius: 1rem; padding: 18px; width: 100%; outline: none; border: 2px solid transparent; color: white; font-size: 1.1rem; font-weight: 700; }
        .btn-primary { background-color: #6366f1; color: white; border-radius: 1.25rem; font-weight: 900; text-transform: uppercase; }
        .hidden { display: none; }
        .table-input { background: #0f172a; width: 100%; font-weight: 900; font-size: 1.25rem; outline: none; border: 1px solid #475569; border-radius: 8px; padding: 8px; text-align: center; color: #818cf8; transition: all 0.3s; }
        .table-input::placeholder { color: rgba(129, 140, 248, 0.3); font-weight: 400; font-style: italic; }
        .table-input.auto-filled { border-color: #22c55e; color: #22c55e; }
        
        /* RPE SELECTOR */
        .rpe-container { display: flex; gap: 6px; justify-content: center; align-items: center; padding: 4px; background: rgba(15, 23, 42, 0.4); border-radius: 12px; }
        .rpe-btn { width: 28px; height: 28px; border-radius: 8px; border: 2px solid transparent; opacity: 0.2; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex-shrink: 0; }
        .rpe-btn.active { opacity: 1; transform: scale(1.15); border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .rpe-green { background-color: #22c55e; }
        .rpe-yellow { background-color: #eab308; }
        .rpe-red { background-color: #ef4444; }

        /* VERBETERDE EX-MODAL ITEMS */
        .ex-item { 
            background: #334155; 
            padding: 18px; 
            border-radius: 1rem; 
            margin-bottom: 10px; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 13px; 
            border: 2px solid #475569;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .ex-item:active { transform: scale(0.96); background-color: #475569; border-color: #6366f1; }
        .ex-item::after { content: '→'; opacity: 0.3; font-size: 18px; }

        .action-btn { font-size: 10px; font-weight: 900; padding: 8px 14px; border-radius: 10px; text-transform: uppercase; border: 2px solid; display: flex; align-items: center; gap: 4px; }
        .btn-copy { color: #22c55e; border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .btn-share { color: #818cf8; border-color: #818cf8; background: rgba(129, 140, 248, 0.1); }
        .btn-delete { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .bottom-nav { background: #0f172a; border-top: 2px solid #334155; position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 15px 5px 25px 5px; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; font-weight: 900; font-size: 10px; text-transform: uppercase; background:none; border:none; }
        .nav-item.active { color: #ffffff; }
        .btn-add-small { color: #ffffff; border: 2px dashed #475569; font-size: 10px; font-weight: 900; padding: 12px; border-radius: 10px; text-transform: uppercase; width: 100%; margin-top: 15px; background:none; }
        .volume-tag { font-size: 8px; background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 2px 5px; border-radius: 4px; font-weight: 900; }
        .heatmap-bar-bg { background: #0f172a; border-radius: 8px; height: 12px; width: 100%; overflow: hidden; margin-top: 4px; }
        .heatmap-bar-fill { background: linear-gradient(90deg, #6366f1, #a855f7); height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-32">

    <header class="flex justify-between items-center mb-8 mt-4 px-1">
        <h1 class="text-3xl font-black tracking-tighter text-white">GYM<span class="text-indigo-400">LOG</span></h1>
        <div id="headerStats" class="text-[10px] font-black text-white uppercase bg-indigo-900/40 px-3 py-2 rounded-lg border border-indigo-500/30 italic">LADEN...</div>
    </header>

    <div id="exModal" class="hidden">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-black italic tracking-tighter">OEFENINGEN</h2>
                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Kies uit bibliotheek</p>
            </div>
            <button onclick="closeExModal()" class="bg-rose-500/20 text-rose-500 px-4 py-2 rounded-xl font-black text-xs">SLUITEN</button>
        </div>
        <div id="exLibraryList" class="pb-20"></div>
    </div>

    <section id="view-training" class="view-section">
        <div class="surface p-8 mb-10 bg-indigo-900/20 border-indigo-400/30">
            <input id="newWorkoutName" class="input-field mb-4" placeholder="NAAM TRAINING" onfocus="this.select()">
            <input id="newWorkoutDate" type="date" class="input-field mb-6 bg-slate-900">
            <button onclick="createNewSession()" class="btn-primary w-full py-5">Sessie Starten</button>
        </div>
        <div id="sessionContainer" class="space-y-8"></div>
    </section>

    <section id="view-charts" class="view-section hidden">
        <div class="surface p-8 mb-8 border-white/10">
            <h2 class="text-xl font-black uppercase mb-6 italic tracking-tighter text-indigo-400 text-center">Progressie</h2>
            <select id="chartExerciseSelect" onchange="updateChart()" class="input-field mb-8 text-sm bg-slate-900 border-white/20 uppercase font-black"></select>
            <div class="h-64 w-full mb-8"><canvas id="progressionChart"></canvas></div>
            <hr class="border-white/10 mb-8">
            <h2 class="text-xl font-black uppercase mb-2 italic tracking-tighter text-indigo-400">Pomp Meter (7 Dagen)</h2>
            <div id="volumeTracker" class="space-y-6 mb-8"></div>
            <hr class="border-white/10 mb-8">
            <h2 class="text-xl font-black uppercase mb-2 italic tracking-tighter text-indigo-400">Spieren Heatmap</h2>
            <div id="muscleHeatmap" class="space-y-6 mb-8"></div>
            <hr class="border-white/10 my-10">
            <h3 class="text-sm font-black uppercase text-emerald-400 mb-4 tracking-widest">🏆 Persoonlijke Records</h3>
            <div id="recordsContainer" class="grid grid-cols-2 gap-3 mb-8"></div>
        </div>
    </section>

    <section id="view-profile" class="view-section hidden">
        <div class="surface p-8 mb-8 border-white/10">
            <h2 class="text-xl font-black uppercase mb-6 italic tracking-tighter text-indigo-400">Profiel</h2>
            <input id="profName" class="input-field mb-10" placeholder="JOUW NAAM" onchange="saveProfileName()" onfocus="this.select()">
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-indigo-500/20 mb-10">
                <h3 class="text-[10px] font-black uppercase mb-4 tracking-widest text-indigo-400">Back-up & Herstel</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="exportData()" class="btn-white-outline text-[9px] border-white/40 p-2 rounded-lg border">💾 DOWNLOAD</button>
                    <button onclick="document.getElementById('importFile').click()" class="btn-white-outline text-[9px] border-white/40 p-2 rounded-lg border">📂 OPEN</button>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                </div>
            </div>
            <label class="text-[10px] font-black uppercase mb-2 block opacity-50">Lichaamsgewicht (KG)</label>
            <div class="flex gap-3 mb-10">
                <input id="profWeightInput" type="number" step="0.1" class="input-field flex-1" placeholder="00.0" onfocus="this.select()">
                <button onclick="logWeight()" class="btn-primary px-6 font-black text-xl">OK</button>
            </div>
            <div id="weightLogList" class="space-y-3 max-h-64 overflow-y-auto"></div>
        </div>
    </section>

    <nav class="bottom-nav">
        <button onclick="showView('training')" id="nav-training" class="nav-item active"><span>🏋️</span><span>Training</span></button>
        <button onclick="showView('charts')" id="nav-charts" class="nav-item"><span>📈</span><span>Stats</span></button>
        <button onclick="showView('profile')" id="nav-profile" class="nav-item"><span>👤</span><span>Profiel</span></button>
    </nav>

    <script>
        const INITIAL_LIBRARY = { "Borst": ["BENCH PRESS", "INCLINE DB PRESS"], "Rug": ["DEADLIFT", "LAT PULLDOWN"], "Benen": ["SQUAT", "LEG PRESS"], "Schouders": ["OVERHEAD PRESS"], "Armen": ["BICEP CURL", "TRICEP PUSHDOWN"], "Buik": ["CRUNCHES"] };
        const DEFAULT_REPS = [12, 10, 8, 6];

        let exLibrary = JSON.parse(localStorage.getItem('gym_ex_library')) || INITIAL_LIBRARY;
        let sessions = [], userData = { name: "GEBRUIKER", weightLogs: [] };
        let activeSessionId = null, chartInstance = null, currentTargetSessionId = null;
        let activeTimers = {};

        function loadFromStorage() {
            sessions = JSON.parse(localStorage.getItem('gym_sessions')) || [];
            userData = JSON.parse(localStorage.getItem('gym_user')) || { name: "GEBRUIKER", weightLogs: [] };
        }

        function init() { loadFromStorage(); document.getElementById('newWorkoutDate').valueAsDate = new Date(); document.getElementById('profName').value = (userData.name === "GEBRUIKER") ? "" : userData.name; updateHeader(); renderSessions(); renderWeightLogs(); populateExerciseSelect(); renderExLibrary(); }
        function updateHeader() { const lastW = (userData.weightLogs && userData.weightLogs.length > 0) ? userData.weightLogs[0].w : "--"; document.getElementById('headerStats').innerText = `${userData.name || "GEBRUIKER"} • ${lastW} KG`; }
        function saveAndRender() { localStorage.setItem('gym_sessions', JSON.stringify(sessions)); localStorage.setItem('gym_user', JSON.stringify(userData)); localStorage.setItem('gym_ex_library', JSON.stringify(exLibrary)); updateHeader(); renderSessions(); renderWeightLogs(); populateExerciseSelect(); }

        function renderExLibrary() {
            const container = document.getElementById('exLibraryList'); container.innerHTML = "";
            for (const [cat, items] of Object.entries(exLibrary)) {
                container.innerHTML += `<h3 class="text-indigo-400 font-black text-[11px] mt-8 mb-3 tracking-widest uppercase italic border-b border-indigo-900/50 pb-1">${cat}</h3>`;
                items.forEach(ex => { container.innerHTML += `<div onclick="selectEx('${ex}')" class="ex-item"><span>${ex}</span></div>`; });
            }
            container.innerHTML += `<div onclick="selectEx('CUSTOM')" class="ex-item !border-dashed !border-indigo-500 !bg-transparent text-indigo-400 justify-center gap-2"><span>+ NIEUWE OEFENING</span></div>`;
        }

        function openExModal(sId) { currentTargetSessionId = sId; document.getElementById('exModal').classList.remove('hidden'); }
        function closeExModal() { document.getElementById('exModal').classList.add('hidden'); }

        function getGhostData(exName, setIdx) {
            const pastSessions = sessions.slice().sort((a,b) => new Date(b.rawDate) - new Date(a.rawDate));
            for (let s of pastSessions) {
                if (s.id === activeSessionId) continue; 
                const ex = s.exercises.find(e => e.name.toUpperCase() === exName.toUpperCase());
                if (ex && ex.sets[setIdx]) return { w: ex.sets[setIdx].w, r: ex.sets[setIdx].r, q: ex.sets[setIdx].q };
            }
            return null;
        }

        function startAutoFillTimer(sId, eId, i, field, ghostValue) {
            const timerId = `${sId}-${eId}-${i}-${field}`;
            if (activeTimers[timerId]) clearTimeout(activeTimers[timerId]);
            activeTimers[timerId] = setTimeout(() => {
                const input = document.getElementById(`input-${timerId}`);
                if (input && input.value === "" && ghostValue) {
                    input.value = ghostValue;
                    input.classList.add('auto-filled');
                    updSet(sId, eId, i, field, ghostValue);
                }
            }, 10000);
        }

        function stopTimer(sId, eId, i, field) {
            const timerId = `${sId}-${eId}-${i}-${field}`;
            if (activeTimers[timerId]) { clearTimeout(activeTimers[timerId]); delete activeTimers[timerId]; }
            const input = document.getElementById(`input-${timerId}`);
            if(input) input.classList.remove('auto-filled');
        }

        function setRPE(sId, eId, setIdx, quality) {
            const ex = sessions.find(s => s.id === sId).exercises.find(e => e.id === eId);
            ex.sets[setIdx].q = quality;
            saveAndRender();
        }

        function selectEx(name) {
            if(name === 'CUSTOM') {
                const newName = prompt("Naam:").trim().toUpperCase(); if(!newName) return;
                const newCat = prompt(`Categorie?`).trim();
                if(newCat) {
                    const matchedCat = Object.keys(exLibrary).find(c => c.toLowerCase() === newCat.toLowerCase()) || newCat;
                    if(!exLibrary[matchedCat]) exLibrary[matchedCat] = [];
                    if(!exLibrary[matchedCat].includes(newName)) exLibrary[matchedCat].push(newName);
                    name = newName;
                } else return;
            }
            const sess = sessions.find(s => s.id === currentTargetSessionId);
            sess.exercises.push({ id: Date.now(), name: name.trim().toUpperCase(), sets: [{w:0, r:12, b:"", q:''}] });
            saveAndRender(); closeExModal();
        }

        function addSetToEx(sId, eId) {
            const ex = sessions.find(s => s.id === sId).exercises.find(e => e.id === eId);
            const nextIdx = ex.sets.length;
            const nextReps = DEFAULT_REPS[nextIdx] !== undefined ? DEFAULT_REPS[nextIdx] : 6;
            ex.sets.push({w:0, r:nextReps, b:'', q:''}); saveAndRender();
        }

        function updSet(sId, eId, i, f, v) { 
            const e = sessions.find(x => x.id === sId).exercises.find(x => x.id === eId);
            e.sets[i][f] = v; localStorage.setItem('gym_sessions', JSON.stringify(sessions)); 
        }

        function renderSessions() {
            const container = document.getElementById('sessionContainer');
            container.innerHTML = sessions.slice().reverse().map(session => `
                <div class="surface overflow-hidden ${activeSessionId === session.id ? 'border-indigo-400' : 'border-white/10'} mb-6">
                    <div class="p-8" onclick="activeSessionId = activeSessionId === ${session.id} ? null : ${session.id}; renderSessions();">
                        <h3 class="text-3xl font-black text-white uppercase italic leading-none">${session.name}</h3>
                        <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mt-1">${session.date}</p>
                        <div class="flex gap-2 mt-4" onclick="event.stopPropagation();">
                            <button onclick="cloneSession(${session.id})" class="action-btn btn-copy">Copy</button>
                            <button onclick="shareWorkout(${session.id})" class="action-btn btn-share">Delen</button>
                            <button onclick="if(confirm('Wissen?')){ sessions=sessions.filter(x=>x.id!==${session.id}); saveAndRender(); }" class="action-btn btn-delete">Wis</button>
                        </div>
                    </div>
                    <div class="${activeSessionId === session.id ? 'px-4 pb-8 pt-4' : 'hidden'}">
                        ${session.exercises.map((ex, exIdx) => `
                            <div class="mb-10 border-l-2 border-indigo-500 pl-4">
                                <div class="flex justify-between items-start mb-3">
                                    <span class="font-black italic uppercase text-xs block text-indigo-300">${ex.name}</span>
                                    <button onclick="const s=sessions.find(x=>x.id===${session.id}); s.exercises.splice(${exIdx},1); saveAndRender();" class="text-red-500 text-[10px] font-black">WIS</button>
                                </div>
                                <table class="w-full border-separate border-spacing-y-2">
                                    <tr class="text-[9px] opacity-40 font-black text-center uppercase tracking-widest">
                                        <th class="w-10">Set</th>
                                        <th>Kg</th>
                                        <th>Reps</th>
                                        <th class="w-32">Focus</th>
                                        <th class="w-8"></th>
                                    </tr>
                                    ${ex.sets.map((s, i) => {
                                        const ghost = getGhostData(ex.name, i);
                                        if (activeSessionId === session.id) {
                                            if(!s.w) startAutoFillTimer(session.id, ex.id, i, 'w', ghost ? ghost.w : null);
                                            if(!s.r) startAutoFillTimer(session.id, ex.id, i, 'r', ghost ? ghost.r : null);
                                        }
                                        return `<tr>
                                            <td class="text-center font-black text-xs opacity-60">S${i+1}</td>
                                            <td><input id="input-${session.id}-${ex.id}-${i}-w" type="text" inputmode="decimal" placeholder="${ghost?ghost.w:'0'}" onfocus="this.select(); stopTimer(${session.id},${ex.id},${i},'w')" oninput="stopTimer(${session.id},${ex.id},${i},'w')" onchange="updSet(${session.id},${ex.id},${i},'w',this.value)" value="${s.w||''}" class="table-input"></td>
                                            <td><input id="input-${session.id}-${ex.id}-${i}-r" type="text" inputmode="numeric" placeholder="${ghost?ghost.r:'0'}" onfocus="this.select(); stopTimer(${session.id},${ex.id},${i},'r')" oninput="stopTimer(${session.id},${ex.id},${i},'r')" onchange="updSet(${session.id},${ex.id},${i},'r',this.value)" value="${s.r||''}" class="table-input"></td>
                                            <td>
                                                <div class="rpe-container">
                                                    <button onclick="setRPE(${session.id},${ex.id},${i},'g')" class="rpe-btn rpe-green ${s.q==='g'?'active':''}"></button>
                                                    <button onclick="setRPE(${session.id},${ex.id},${i},'y')" class="rpe-btn rpe-yellow ${s.q==='y'?'active':''}"></button>
                                                    <button onclick="setRPE(${session.id},${ex.id},${i},'r')" class="rpe-btn rpe-red ${s.q==='r'?'active':''}"></button>
                                                </div>
                                            </td>
                                            <td class="text-right">
                                                <button onclick="const e=sessions.find(s=>s.id===${session.id}).exercises.find(x=>x.id===${ex.id}); if(e.sets.length>1){e.sets.splice(${i},1); saveAndRender();}" class="btn-remove-set">&times;</button>
                                            </td>
                                        </tr>`;
                                    }).join('')}
                                </table>
                                <button onclick="addSetToEx(${session.id}, ${ex.id})" class="btn-add-small">+ SET TOEVOEGEN</button>
                            </div>`).join('')}
                        <button onclick="openExModal(${session.id})" class="btn-primary w-full py-3 text-xs mt-4">+ OEFENING TOEVOEGEN</button>
                    </div>
                </div>`).join('');
        }

        function renderVolumeTracker() {
            const container = document.getElementById('volumeTracker'); container.innerHTML = "";
            let volumePerCat = {}, exToCat = {};
            for (const [cat, exs] of Object.entries(exLibrary)) exs.forEach(e => exToCat[e.toUpperCase()] = cat);
            const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            sessions.forEach(s => { if (new Date(s.rawDate) >= sevenDaysAgo) { s.exercises.forEach(ex => { const cat = exToCat[ex.name.toUpperCase()] || "OVERIG"; volumePerCat[cat] = (volumePerCat[cat] || 0) + ex.sets.reduce((sum, st) => sum + ((parseFloat(st.w) || 0) * (parseInt(st.r) || 0)), 0); }); } });
            const sortedCats = Object.entries(volumePerCat).sort((a,b) => b[1] - a[1]);
            const maxVol = sortedCats.length > 0 ? sortedCats[0][1] : 1;
            sortedCats.forEach(([cat, vol]) => { if (vol === 0) return; const perc = Math.min(100, Math.round((vol / maxVol) * 100)); container.innerHTML += `<div><div class="flex justify-between items-end mb-1"><span class="text-[10px] font-black uppercase tracking-widest">${cat}</span><span class="volume-tag">${vol.toLocaleString()} KG VOL.</span></div><div class="heatmap-bar-bg"><div class="heatmap-bar-fill !from-emerald-400 !to-cyan-500" style="width: ${perc}%"></div></div></div>`; });
        }

        function renderHeatmap() {
            const container = document.getElementById('muscleHeatmap');
            container.innerHTML = "";
            let counts = {}, total = 0, exToCat = {};
            for (const [cat, exs] of Object.entries(exLibrary)) exs.forEach(e => exToCat[e.toUpperCase()] = cat);
            sessions.forEach(s => s.exercises.forEach(ex => { const cat = exToCat[ex.name.toUpperCase()] || "OVERIG"; const sets = ex.sets.length; counts[cat] = (counts[cat] || 0) + sets; total += sets; }));
            if(total === 0) return;
            Object.keys(counts).sort((a,b) => counts[b] - counts[a]).forEach(cat => { const perc = Math.round((counts[cat] / total) * 100); if(perc > 0) container.innerHTML += `<div><div class="flex justify-between items-end mb-1"><span class="text-[10px] font-black uppercase tracking-widest">${cat}</span><span class="text-[10px] font-black text-indigo-400">${perc}%</span></div><div class="heatmap-bar-bg"><div class="heatmap-bar-fill" style="width: ${perc}%"></div></div></div>`; });
        }

        function renderStats() { const cont = document.getElementById('recordsContainer'); cont.innerHTML = ""; const recs = {}; sessions.forEach(s => s.exercises.forEach(ex => { const w = Math.max(...ex.sets.map(st => parseFloat(st.w) || 0)); const name = ex.name.toUpperCase(); if(!recs[name] || w > recs[name]) recs[name] = w; })); Object.keys(recs).sort().forEach(n => { cont.innerHTML += `<div class="stat-card p-4 bg-slate-900/50 rounded-2xl border border-white/5"><p class="text-[8px] font-black opacity-50 uppercase">${n}</p><p class="text-lg font-black text-emerald-400">${recs[n]} KG</p></div>`; }); }
        function updateChart() { const name = document.getElementById('chartExerciseSelect').value; if(!name) return; const relevant = sessions.filter(s => s.exercises.some(e => e.name.toUpperCase() === name)).sort((a,b) => new Date(a.rawDate) - new Date(b.rawDate)); const labels = relevant.map(s => new Date(s.rawDate).toLocaleDateString('nl-NL', {day:'numeric', month:'short'})); const weights = relevant.map(s => Math.max(...s.exercises.find(e => e.name.toUpperCase() === name).sets.map(st => parseFloat(st.w) || 0))); if(chartInstance) chartInstance.destroy(); chartInstance = new Chart(document.getElementById('progressionChart'), { type: 'line', data: { labels, datasets: [{ data: weights, borderColor: '#6366f1', tension: 0.3, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)' }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#64748b' } }, x: { ticks: { color: '#64748b' } } } } }); }
        function showView(v) { document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById('view-'+v).classList.remove('hidden'); document.getElementById('nav-'+v).classList.add('active'); if(v==='charts') { updateChart(); renderStats(); renderHeatmap(); renderVolumeTracker(); } }
        function createNewSession() { const name = (document.getElementById('newWorkoutName').value || "Training").toUpperCase(); const rawDate = document.getElementById('newWorkoutDate').value; sessions.push({ id: Date.now(), name, date: new Date(rawDate).toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'long' }), rawDate, exercises: [] }); activeSessionId = sessions[sessions.length-1].id; saveAndRender(); }
        function cloneSession(id) { const old = sessions.find(s => s.id === id); const d = new Date(); const news = { id: Date.now(), name: old.name, date: d.toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'long' }), rawDate: d.toISOString().split('T')[0], exercises: old.exercises.map(ex => ({ id: Date.now()+Math.random(), name: ex.name.toUpperCase(), sets: ex.sets.map(s => ({w:s.w, r:s.r, b:"", q:s.q})) })) }; sessions.push(news); activeSessionId = news.id; saveAndRender(); showView('training'); }
        async function shareWorkout(id) { const s = sessions.find(x => x.id === id); let t = `🏋️ *GYMLOG: ${s.name}*\n📅 ${s.date}\n\n`; s.exercises.forEach(ex => { t += `💪 *${ex.name}*\n`; ex.sets.forEach((st, i) => { t += `   Set ${i+1}: ${st.w}kg x ${st.r}\n`; }); }); try { if (navigator.share) await navigator.share({ title: `Training: ${s.name}`, text: t }); else { await navigator.clipboard.writeText(t); alert("Gekopieerd!"); } } catch (e) { alert("Fout."); } }
        function logWeight() { const v = document.getElementById('profWeightInput').value; if(v){ userData.weightLogs.unshift({w:parseFloat(v), date:new Date().toLocaleDateString('nl-NL'), ts:Date.now()}); saveAndRender(); document.getElementById('profWeightInput').value=""; }}
        function renderWeightLogs() { document.getElementById('weightLogList').innerHTML = (userData.weightLogs || []).map(l => `<div class="flex justify-between bg-slate-800/50 p-4 rounded-xl mb-2 border border-white/5"><span class="font-black">${l.w} KG</span><span class="opacity-40 text-[10px] font-black uppercase">${l.date}</span></div>`).join(''); }
        function saveProfileName() { userData.name = document.getElementById('profName').value.toUpperCase(); saveAndRender(); }
        function populateExerciseSelect() { const u = [...new Set(sessions.flatMap(s => s.exercises.map(e => e.name.toUpperCase())))].sort(); document.getElementById('chartExerciseSelect').innerHTML = u.map(n => `<option value="${n}">${n}</option>`).join(''); }
        function exportData() { const blob = new Blob([JSON.stringify({ sessions, userData, exLibrary })], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `gymlog_backup.json`; a.click(); }

        function importData(e) { 
            const reader = new FileReader(); 
            reader.onload = (ev) => { 
                try {
                    const d = JSON.parse(ev.target.result); 
                    if(d.sessions) sessions = d.sessions;
                    if(d.userData) userData = d.userData; else if(d.user) userData = d.user; else if(d.profile) userData = d.profile;
                    if(d.exLibrary) exLibrary = d.exLibrary;
                    saveAndRender(); init(); alert("Herstel succesvol!"); 
                } catch(err) { alert("Fout: " + err.message); }
            }; 
            reader.readAsText(e.target.files[0]); 
        }

        init();
    </script>
</body>
</html>
