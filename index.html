<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymLog Pro - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #ffffff; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        .surface { background-color: #1e293b; border-radius: 2rem; border: 2px solid #334155; }
        .input-field { background-color: #334155; border-radius: 1rem; padding: 18px; width: 100%; outline: none; border: 2px solid transparent; color: white; font-size: 1.1rem; font-weight: 700; }
        .input-field:focus { border-color: #6366f1; }
        .btn-primary { background-color: #6366f1; color: white; border-radius: 1.25rem; font-weight: 900; text-transform: uppercase; transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.98); }
        .hidden { display: none; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); z-index: 100; }
        .table-input { background: #0f172a; width: 100%; font-weight: 900; font-size: 1.25rem; outline: none; border: 1px solid #475569; border-radius: 8px; padding: 8px; text-align: center; color: #818cf8; }
        .btn-white-outline { color: #ffffff; border: 2px solid #ffffff; font-size: 11px; font-weight: 900; padding: 10px 16px; border-radius: 12px; text-transform: uppercase; }
        .bottom-nav { background: #0f172a; border-top: 2px solid #334155; position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 15px 5px 25px 5px; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; font-weight: 900; font-size: 10px; text-transform: uppercase; border: none; background: none; }
        .nav-item.active { color: #ffffff; }
        .btn-add-small { color: #ffffff; border: 2px dashed #475569; font-size: 10px; font-weight: 900; padding: 12px; border-radius: 10px; text-transform: uppercase; width: 100%; margin-top: 15px; background: none; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-32">

    <header class="flex justify-between items-center mb-8 mt-4 px-1">
        <h1 class="text-3xl font-black tracking-tighter text-white">GYM<span class="text-indigo-400">LOG</span></h1>
        <div id="headerStats" class="text-[10px] font-black text-white uppercase bg-indigo-900/40 px-3 py-2 rounded-lg border border-indigo-500/30 italic">LADEN...</div>
    </header>

    <section id="view-training" class="view-section">
        <div class="surface p-8 mb-10 bg-indigo-900/20 border-indigo-400/30">
            <input id="newWorkoutName" class="input-field mb-4" placeholder="NAAM TRAINING" onfocus="this.select()">
            <input id="newWorkoutDate" type="date" class="input-field mb-6 bg-slate-900">
            <button onclick="createNewSession()" class="btn-primary w-full py-5">Sessie Starten</button>
        </div>
        <div id="sessionContainer" class="space-y-8"></div>
    </section>

    <section id="view-charts" class="view-section hidden">
        <div class="surface p-8 mb-8 border-white/10">
            <h2 class="text-xl font-black uppercase mb-6 italic tracking-tighter">Kracht Progressie</h2>
            <select id="chartExerciseSelect" onchange="updateChart()" class="input-field mb-8 text-sm bg-slate-900 border-white/20 uppercase font-black"></select>
            <div class="h-80 w-full"><canvas id="progressionChart"></canvas></div>
        </div>
    </section>

    <section id="view-profile" class="view-section hidden">
        <div class="surface p-8 mb-8 border-white/10">
            <h2 class="text-xl font-black uppercase mb-6 italic tracking-tighter">Mijn Profiel</h2>
            <input id="profName" class="input-field mb-10" placeholder="NAAM" onchange="saveProfileName()" onfocus="this.select()">
            
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-indigo-500/20 mb-10">
                <h3 class="text-[10px] font-black uppercase mb-4 tracking-widest text-indigo-400">Data & Backup</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="exportData()" class="btn-white-outline text-center text-[9px] bg-indigo-600/20">💾 Backup Maken</button>
                    <button onclick="document.getElementById('importFile').click()" class="btn-white-outline text-center text-[9px]">📂 Herstellen</button>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)" accept=".json">
                </div>
            </div>

            <label class="text-[10px] font-black uppercase mb-2 block opacity-50">Nieuw Gewicht Loggen (KG)</label>
            <div class="flex gap-3 mb-10">
                <input id="profWeightInput" type="number" step="0.1" inputmode="decimal" class="input-field flex-1" placeholder="00.0" onfocus="this.select()">
                <button onclick="logWeight()" class="btn-primary px-6 font-black text-xl">OK</button>
            </div>
            <h3 class="text-xs font-black uppercase mb-4 tracking-widest text-indigo-400 italic">Historie Gewicht</h3>
            <div id="weightLogList" class="space-y-3 max-h-64 overflow-y-auto pr-2"></div>
        </div>
    </section>

    <nav class="bottom-nav">
        <button onclick="showView('training')" id="nav-training" class="nav-item active"><span class="text-xl">🏋️</span><span>Training</span></button>
        <button onclick="showView('charts')" id="nav-charts" class="nav-item"><span class="text-xl">📈</span><span>Progressie</span></button>
        <button onclick="showView('profile')" id="nav-profile" class="nav-item"><span class="text-xl">👤</span><span>Profiel</span></button>
    </nav>

    <div id="pickerModal" class="hidden fixed inset-0 modal-bg flex flex-col p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h3 id="pickerTitle" class="text-2xl font-black italic uppercase text-indigo-400">Categorie</h3>
            <button onclick="closePicker()" class="text-white font-black text-4xl">&times;</button>
        </div>
        <div id="categoryList" class="space-y-4"></div>
        <div id="exerciseList" class="hidden space-y-4">
            <button onclick="showCategories()" class="text-indigo-400 font-black uppercase text-xs mb-6 flex items-center">← Terug naar lijst</button>
            <div id="exerciseItems" class="space-y-3"></div>
            <div class="pt-8 border-t border-white/10 mt-6">
                <input id="customExInput" class="input-field mb-3" placeholder="NAAM OEFENING..." onfocus="this.select()">
                <button onclick="addCustomEx()" class="btn-primary w-full py-4 text-sm">Toevoegen</button>
            </div>
        </div>
    </div>

    <script>
        // DATA SETUP
        const DEFAULT_EX = { "Leg": ["Squat", "Leg Press"], "Bicep": ["Barbell Curl"], "Tricep": ["Pushdown"], "Chest": ["Bench Press"], "Core": ["Plank"], "Back": ["Deadlift"], "Shoulders": ["Overhead Press"] };
        let exData = JSON.parse(localStorage.getItem('gym_ex_list')) || DEFAULT_EX;
        let sessions = JSON.parse(localStorage.getItem('gym_sessions')) || [];
        let userData = JSON.parse(localStorage.getItem('gym_user')) || { name: "ATLEET", weightLogs: [] };
        let activeSessionId = null;
        let activeCategory = null;
        let chartInstance = null;

        function init() {
            document.getElementById('newWorkoutDate').valueAsDate = new Date();
            document.getElementById('profName').value = userData.name || "";
            updateHeader(); renderSessions(); renderWeightLogs(); populateExerciseSelect();
        }

        // NAVIGATION
        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            document.getElementById('nav-' + viewId).classList.add('active');
            if(viewId === 'charts') updateChart();
        }

        // BACKUP & IMPORT (ROBUUST)
        function exportData() {
            try {
                const data = { sessions, exList: exData, user: userData };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `gymlog_backup_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
                alert("Backup succesvol gedownload!");
            } catch(e) { alert("Fout: " + e.message); }
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(confirm("Huidige data overschrijven met backup?")){
                        localStorage.setItem('gym_sessions', JSON.stringify(data.sessions || []));
                        localStorage.setItem('gym_ex_list', JSON.stringify(data.exList || DEFAULT_EX));
                        localStorage.setItem('gym_user', JSON.stringify(data.user || userData));
                        location.reload();
                    }
                } catch(err) { alert("Geen geldig backup bestand."); }
            };
            reader.readAsText(event.target.files[0]);
        }

        // CORE FUNCTIONS
        function updateHeader() {
            const lastW = (userData.weightLogs && userData.weightLogs.length > 0) ? userData.weightLogs[0].w : "--";
            document.getElementById('headerStats').innerText = `${userData.name || "ATLEET"} • ${lastW} KG`;
        }

        function saveProfileName() {
            userData.name = document.getElementById('profName').value.toUpperCase() || "ATLEET";
            localStorage.setItem('gym_user', JSON.stringify(userData));
            updateHeader();
        }

        function logWeight() {
            const val = document.getElementById('profWeightInput').value;
            if(val) {
                const entry = { w: parseFloat(val), date: new Date().toLocaleDateString('nl-NL'), time: new Date().toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'}), ts: Date.now() };
                if(!userData.weightLogs) userData.weightLogs = [];
                userData.weightLogs.unshift(entry);
                localStorage.setItem('gym_user', JSON.stringify(userData));
                renderWeightLogs(); updateHeader(); document.getElementById('profWeightInput').value = "";
            }
        }

        function renderWeightLogs() {
            const container = document.getElementById('weightLogList');
            container.innerHTML = (userData.weightLogs || []).map(log => `
                <div class="flex justify-between items-center bg-slate-800/50 p-4 rounded-xl border border-white/5">
                    <div><p class="text-lg font-black">${log.w} KG</p><p class="text-[10px] text-white/50 font-bold">${log.date} ${log.time}</p></div>
                    <button onclick="deleteLog(${log.ts})" class="text-red-500 font-bold text-xl">&times;</button>
                </div>`).join('');
        }

        function deleteLog(ts) {
            userData.weightLogs = userData.weightLogs.filter(l => l.ts !== ts);
            localStorage.setItem('gym_user', JSON.stringify(userData));
            renderWeightLogs(); updateHeader();
        }

        function shareWorkout(id) {
            const s = sessions.find(x => x.id === id);
            let text = `🔥 GYMLOG: ${s.name}\n📅 ${s.date}\n\n`;
            s.exercises.forEach(ex => {
                text += `💪 ${ex.name}\n`;
                ex.sets.forEach((set, i) => { text += `   Set ${i+1}: ${set.w}kg x ${set.r} reps\n`; });
                text += `\n`;
            });
            if (navigator.share) navigator.share({ text }).catch(() => {});
            else { navigator.clipboard.writeText(text); alert("Gekopieerd naar klembord!"); }
        }

        function createNewSession() {
            const name = (document.getElementById('newWorkoutName').value || "Training").toUpperCase();
            const rawDate = document.getElementById('newWorkoutDate').value;
            const formattedDate = new Date(rawDate).toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'long' });
            sessions.push({ id: Date.now(), name, date: formattedDate, rawDate, exercises: [] });
            saveAndRender(); document.getElementById('newWorkoutName').value = "";
        }

        function updSet(sId, eId, i, f, v) {
            const s = sessions.find(x => x.id === sId);
            const e = s.exercises.find(x => x.id === eId);
            e.sets[i][f] = parseFloat(v.toString().replace(',', '.')) || 0;
            localStorage.setItem('gym_sessions', JSON.stringify(sessions));
        }

        function addManualSet(sId, eId) {
            const ex = sessions.find(s => s.id === sId).exercises.find(e => e.id === eId);
            ex.sets.push({ ...(ex.sets[ex.sets.length-1] || {w:0, r:0, b:0}) });
            saveAndRender();
        }

        function saveAndRender() { localStorage.setItem('gym_sessions', JSON.stringify(sessions)); renderSessions(); populateExerciseSelect(); }

        function renderSessions() {
            const container = document.getElementById('sessionContainer');
            container.innerHTML = sessions.slice().reverse().map(session => {
                const isActive = activeSessionId === session.id;
                return `
                <div class="surface overflow-hidden ${isActive ? 'border-indigo-400' : 'border-white/10'} mb-6">
                    <div class="p-8 flex flex-col gap-4" onclick="activeSessionId = activeSessionId === ${session.id} ? null : ${session.id}; renderSessions();">
                        <div class="flex justify-between items-center">
                            <h3 class="text-3xl font-black text-white uppercase italic">${session.name}</h3>
                            <div class="flex gap-2" onclick="event.stopPropagation();">
                                <button onclick="shareWorkout(${session.id})" class="btn-white-outline !border-indigo-500 !text-indigo-400">📤</button>
                                <button onclick="if(confirm('Wissen?')){ sessions=sessions.filter(x=>x.id!==${session.id}); saveAndRender(); }" class="btn-white-outline !border-red-500 !text-red-500">🗑️</button>
                            </div>
                        </div>
                        <p class="text-sm font-black text-indigo-400 uppercase tracking-widest">${session.date}</p>
                    </div>
                    <div class="${isActive ? 'px-8 pb-8 border-t-4 border-slate-900 pt-8' : 'hidden'}">
                        <button onclick="openPicker(${session.id})" class="w-full mb-10 border-2 border-white text-white py-5 rounded-2xl text-sm font-black uppercase tracking-widest">+ OEFENING</button>
                        <div class="space-y-12">
                            ${session.exercises.map((ex, exIdx) => `
                                <div class="exercise-card border-l-4 border-indigo-500 pl-6">
                                    <div class="flex justify-between items-center mb-6"><span class="text-xl font-black text-white uppercase italic">${ex.name}</span><button onclick="const s=sessions.find(x=>x.id===${session.id}); s.exercises.splice(${exIdx},1); saveAndRender();" class="text-red-500 font-bold text-xs uppercase">Wis</button></div>
                                    <table class="w-full text-left"><tr class="text-white/40 font-black uppercase text-[10px] tracking-widest"><th class="pb-4">SET</th><th class="pb-4">KG</th><th class="pb-4">REPS</th><th class="pb-4">BPM</th></tr>
                                        ${ex.sets.map((s, i) => `
                                            <tr class="border-b border-white/5">
                                                <td class="py-4 font-black text-white text-xl">S${i+1}</td>
                                                <td><input type="text" inputmode="decimal" onfocus="this.select()" onchange="updSet(${session.id},${ex.id},${i},'w',this.value)" value="${s.w}" class="table-input"></td>
                                                <td><input type="text" inputmode="numeric" onfocus="this.select()" onchange="updSet(${session.id},${ex.id},${i},'r',this.value)" value="${s.r}" class="table-input"></td>
                                                <td><input type="text" inputmode="numeric" onfocus="this.select()" onchange="updSet(${session.id},${ex.id},${i},'b',this.value)" value="${s.b || ''}" class="table-input !text-rose-500"></td>
                                                <td class="text-right"><button onclick="const s=sessions.find(x=>x.id===${session.id}); const e=s.exercises.find(ex=>ex.id===${ex.id}); e.sets.splice(${i},1); saveAndRender();" class="text-white font-black text-2xl">&times;</button></td>
                                            </tr>`).join('')}
                                    </table><button onclick="addManualSet(${session.id}, ${ex.id})" class="btn-add-small">+ SET</button>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // PICKER & CHART LOGIC
        function renderCategories() {
            document.getElementById('categoryList').innerHTML = Object.keys(exData).sort().map(cat => `<button onclick="selectCategory('${cat}')" class="w-full surface p-6 text-left text-xl font-black border-white/10 flex justify-between uppercase italic">${cat} <span>→</span></button>`).join('');
        }
        function selectCategory(cat) {
            activeCategory = cat; document.getElementById('pickerTitle').innerText = cat; document.getElementById('categoryList').classList.add('hidden');
            document.getElementById('exerciseItems').innerHTML = (exData[cat] || []).sort().map(ex => `<button onclick="pickEx('${ex}')" class="w-full bg-slate-800 p-5 rounded-xl text-left font-bold border border-slate-700 uppercase">${ex}</button>`).join('');
            document.getElementById('exerciseList').classList.remove('hidden');
        }
        function showCategories() { document.getElementById('pickerTitle').innerText = "Categorie"; document.getElementById('categoryList').classList.remove('hidden'); document.getElementById('exerciseList').classList.add('hidden'); renderCategories(); }
        function openPicker(sId) { activeSessionId = sId; document.getElementById('pickerModal').classList.remove('hidden'); showCategories(); }
        function closePicker() { document.getElementById('pickerModal').classList.add('hidden'); }
        function pickEx(name) {
            sessions.find(s => s.id === activeSessionId).exercises.push({ id: Date.now(), name: name.toUpperCase(), sets: [{ w: 0, r: 0, b: 0 }] });
            saveAndRender(); closePicker();
        }
        function addCustomEx() {
            const val = document.getElementById('customExInput').value.trim();
            if(val && activeCategory) { if (!exData[activeCategory].includes(val)) { exData[activeCategory].push(val); localStorage.setItem('gym_ex_list', JSON.stringify(exData)); } pickEx(val); document.getElementById('customExInput').value = ""; }
        }
        function populateExerciseSelect() {
            const unique = [...new Set(sessions.flatMap(s => s.exercises.map(ex => ex.name)))].sort();
            document.getElementById('chartExerciseSelect').innerHTML = unique.map(n => `<option value="${n}">${n}</option>`).join('');
        }
        function updateChart() {
            const exName = document.getElementById('chartExerciseSelect').value; if(!exName) return;
            const relevant = sessions.filter(s => s.exercises.some(e => e.name === exName));
            const labels = [], weights = [];
            relevant.forEach(s => { const ex = s.exercises.find(e => e.name === exName); labels.push(new Date(s.rawDate).toLocaleDateString('nl-NL', {day:'numeric', month:'short'})); weights.push(Math.max(...ex.sets.map(st => st.w || 0))); });
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('progressionChart'), { type: 'line', data: { labels, datasets: [{ data: weights, borderColor: '#6366f1', tension: 0.4, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)', pointBackgroundColor: '#ffffff' }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } } });
        }

        init();
    </script>
</body>
</html>
