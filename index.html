<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GymLog Pro - v2.6.2</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%236366f1%22/><path d=%22M30 40h10v20H30zM60 40h10v20H60zM35 48h30v4H35z%22 fill=%22white%22/></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; --bg: #020617; }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; min-height: 100vh; overflow-x: hidden; }
        .view-section { padding-bottom: 140px !important; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; transition: all 0.2s ease; }
        button, .ex-item, .ex-name-btn, nav button, .glass { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s; cursor: pointer; }
        button:active, .ex-item:active, .ex-name-btn:active, nav button:active { transform: scale(0.96); opacity: 0.8; }
        .input-field { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 0.75rem; padding: 14px; width: 100%; color: white; font-weight: 700; outline: none; transition: all 0.2s; display: block; box-sizing: border-box; appearance: none; -webkit-appearance: none; }
        input[type="date"].input-field { min-height: 52px; line-height: 1.2; }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); border-radius: 1rem; font-weight: 800; text-transform: uppercase; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .table-input { background: #0f172a; width: 100%; font-weight: 800; font-size: 0.85rem; border-radius: 8px; padding: 8px; text-align: center; color: var(--accent); border: 1px solid rgba(255,255,255,0.1); }
        .action-btn { font-size: 9px; font-weight: 900; padding: 5px 10px; border-radius: 6px; text-transform: uppercase; border: 1px solid; }
        .btn-copy { color: #22c55e; border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .btn-share { color: #818cf8; border-color: #818cf8; background: rgba(129, 140, 248, 0.1); }
        .btn-delete { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        #exCategoryScroll { background: #0f172a; border-bottom: 1px solid rgba(99, 102, 241, 0.3); position: sticky; top: 0; z-index: 50; display: flex; gap: 8px; overflow-x: auto; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .cat-tab { padding: 12px 20px; border-radius: 14px; white-space: nowrap; font-size: 11px; font-weight: 900; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); background: #1e293b; }
        .cat-tab.active { background: var(--accent); color: white; border-color: #818cf8; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .ex-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .ex-item { background: #1e293b; padding: 16px; border-radius: 1rem; border: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; justify-content: space-between; min-height: 70px; font-size: 12px; font-weight: 800; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .record-tile { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 0.75rem; padding: 10px; display: flex; flex-direction: column; justify-content: center; }
        .filter-btn { font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 4px; background: rgba(255,255,255,0.05); transition: all 0.2s; }
        .filter-btn.active { background: var(--accent); box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4); }
        .heatmap-bar-fill { background: linear-gradient(90deg, #6366f1, #a855f7); height: 100%; transition: width 0.8s; }
        .hidden { display: none; }
        .reload-btn { background: rgba(255,255,255,0.05); border-radius: 0.5rem; padding: 4px 8px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); margin-left: 8px; }
        .ex-name-btn { text-align: left; padding: 4px 8px; background: rgba(99, 102, 241, 0.1); border-radius: 6px; border: 1px solid rgba(99, 102, 241, 0.2); }
        .month-header { font-size: 11px; font-weight: 900; color: #6366f1; letter-spacing: 1px; margin: 24px 0 12px 4px; display: flex; align-items: center; gap: 8px; opacity: 0.8; cursor: pointer; }
        .month-header::after { content: ''; height: 1px; background: linear-gradient(90deg, rgba(99,102,241,0.3), transparent); flex: 1; }
        nav { position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; width: 100% !important; height: 85px !important; z-index: 9999 !important; background: rgba(15, 23, 42, 0.95) !important; backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .bmw-wrap { background: #020617; position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column; padding: 30px; overflow-y: auto; padding-bottom: 140px; }
        .bmw-capture-area { background: linear-gradient(180deg, #0f172a 0%, #020617 100%); padding: 20px; border-radius: 10px; }
        .bmw-tag { color: #6366f1; font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .bmw-title { font-size: 28px; font-weight: 900; font-style: italic; line-height: 1.1; text-transform: uppercase; margin-bottom: 30px; }
        .bmw-stat-row { border-top: 1px solid rgba(255,255,255,0.1); padding: 18px 0; }
        .bmw-val { font-size: 22px; font-weight: 900; display: block; margin-bottom: 2px; }
        .bmw-label { font-size: 10px; font-weight: 700; opacity: 0.5; text-transform: uppercase; }
        .bmw-hero-text { font-size: 34px; font-weight: 900; font-style: italic; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.2); text-transform: uppercase; margin-top: 20px; }
        .bmw-neon-glow { color: #fff; text-shadow: 0 0 10px rgba(99,102,241,0.8); }
        .bmw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding: 18px 0; }
        .overlay-nav { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); scrollbar-width: none; }
        .overlay-nav-btn { font-size: 7px; font-weight: 900; white-space: nowrap; padding: 6px 10px; border-radius: 6px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); text-transform: uppercase; }
        .overlay-nav-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-8 pt-4">
        <div class="flex items-center">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter inline-block">GYM<span class="text-indigo-500">LOG</span></h1>
                <span class="text-[10px] font-black opacity-20 ml-1">v2.6.2</span>
            </div>
            <button data-testid="btn-app-reload" onclick="location.reload(true)" class="reload-btn">↻</button>
        </div>
        <div id="headerStats" data-testid="stat-header-summary" class="glass px-4 py-2 text-[10px] font-bold border-indigo-500/30 text-indigo-100 uppercase italic">LADEN...</div>
    </header>

    <div id="exModal" data-testid="modal-exercise-library" class="hidden fixed inset-0 z-[100] bg-slate-950 flex flex-col">
        <div class="p-6 flex justify-between items-center bg-slate-950 border-b border-white/10">
            <h2 class="text-xl font-black italic text-white uppercase tracking-tighter">Kies <span class="text-indigo-500">Oefening</span></h2>
            <button data-testid="btn-close-ex-modal" onclick="closeExModal()" class="glass w-10 h-10 flex items-center justify-center text-rose-500 font-bold">✕</button>
        </div>
        <div id="exCategoryScroll" data-testid="list-exercise-categories" class="no-scrollbar"></div>
        <div class="flex-1 overflow-y-auto p-6 pb-40 bg-slate-950">
            <div id="exLibraryList" data-testid="grid-exercise-items" class="ex-grid"></div>
            <button data-testid="btn-start-custom-ex" onclick="startCustomEx()" class="btn-primary w-full py-4 mt-8 italic text-xs tracking-widest">+ EIGEN OEFENING</button>
        </div>
    </div>

    <div id="bmwOverlay" data-testid="overlay-monthly-recap" class="bmw-wrap hidden">
        <div class="flex justify-end mb-4">
             <button data-testid="btn-close-bmw" onclick="document.getElementById('bmwOverlay').classList.add('hidden')" class="glass w-10 h-10 flex items-center justify-center text-rose-500 font-bold">✕</button>
        </div>
        <div id="captureTarget" data-testid="capture-area-recap" class="bmw-capture-area">
            <div class="bmw-tag">GymLog Recap</div>
            <h2 class="bmw-title">Terugblik <span id="recapMonth" class="text-indigo-500">MAART</span></h2>
            <div class="bmw-stat-row">
                <span class="bmw-val" id="recapSessions" data-testid="stat-recap-sessions">0</span>
                <span class="bmw-label">Gym sessies bezocht</span>
            </div>
            <div class="bmw-stat-row">
                <span class="bmw-val" id="recapVolume" data-testid="stat-recap-volume">0 KG</span>
                <span class="bmw-label">Totaal Volume Verplaatst</span>
            </div>
            <div class="bmw-grid" id="recapMuscleGrid" data-testid="grid-recap-muscles"></div>
            <div class="bmw-hero-text">PROGRESSIE <span class="bmw-neon-glow">GEBOEKT</span></div>
            <p class="text-[7px] opacity-20 uppercase mt-4">Genereerd door GymLog Pro © 2026</p>
        </div>
        <div class="mt-8 px-2">
            <button id="btnImgShare" data-testid="btn-share-recap-image" onclick="shareAsImage()" class="btn-primary w-full py-5 italic text-sm shadow-xl shadow-indigo-500/20">AFBEELDING DELEN 📸</button>
        </div>
    </div>

    <div id="drillDownModal" data-testid="modal-drilldown" class="hidden fixed inset-0 z-[120] bg-slate-950/98 p-6 flex flex-col items-center justify-center">
        <div class="glass p-6 w-full max-w-sm relative flex flex-col">
            <button data-testid="btn-close-drilldown" onclick="document.getElementById('drillDownModal').classList.add('hidden')" class="absolute top-4 right-4 text-rose-500 font-bold z-10">✕</button>
            <h3 id="drillDownTitle" data-testid="label-drilldown-title" class="text-center font-black italic mb-4 text-indigo-400 uppercase">DETAILS</h3>
            <div id="drillDownNav" data-testid="nav-drilldown-categories" class="overlay-nav"></div>
            <div class="h-64 w-full"><canvas id="drillDownChart" data-testid="chart-drilldown"></canvas></div>
        </div>
    </div>

    <div id="catSelectorModal" data-testid="modal-category-link" class="hidden fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-6">
        <div class="glass p-6 w-full max-w-xs">
            <h3 class="text-center font-black italic mb-6 text-indigo-400 uppercase">Link naar Spiergroep</h3>
            <div id="catBtnContainer" data-testid="list-category-links" class="grid grid-cols-1 gap-3"></div>
            <button data-testid="btn-cancel-cat-link" onclick="document.getElementById('catSelectorModal').classList.add('hidden')" class="w-full mt-6 text-[10px] font-bold opacity-40 uppercase">Annuleren</button>
        </div>
    </div>

    <section id="view-training" data-testid="view-training" class="view-section">
        <div class="glass p-6 mb-8 border-indigo-500/20">
            <input id="newWorkoutName" data-testid="input-session-name" class="input-field mb-4" placeholder="NAAM TRAINING">
            <input id="newWorkoutDate" data-testid="input-session-date" type="date" class="input-field mb-6">
            <button data-testid="btn-create-session" onclick="createNewSession()" class="btn-primary w-full py-4 italic">Sessie Starten</button>
        </div>
        <div id="sessionContainer" data-testid="container-sessions"></div>
    </section>

    <section id="view-charts" data-testid="view-charts" class="view-section hidden">
        <button data-testid="btn-open-recap" onclick="generateBMWRecap()" class="w-full glass p-4 mb-6 border-indigo-500/50 flex items-center justify-between">
            <div class="text-left">
                <div class="text-[10px] font-black text-indigo-400 uppercase italic">Recap</div>
                <div class="text-sm font-black italic">MAANDOVERZICHT</div>
            </div>
            <span class="text-2xl">⚡</span>
        </button>
        <div class="glass p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[10px] font-black text-indigo-400 uppercase italic">Spiergroep Balans</h3>
                <div class="flex gap-1" id="radarFilters">
                    <button data-testid="btn-filter-radar-week" onclick="renderRadarChart(7)" class="filter-btn active">WEEK</button>
                    <button data-testid="btn-filter-radar-month" onclick="renderRadarChart(30)" class="filter-btn">MAAND</button>
                    <button data-testid="btn-filter-radar-year" onclick="renderRadarChart(9999)" class="filter-btn">JAAR</button>
                </div>
            </div>
            <div class="h-64 w-full"><canvas id="radarChart" data-testid="chart-radar-balance"></canvas></div>
        </div>
        <div class="glass p-6 mb-6">
            <select id="chartExerciseSelect" data-testid="select-chart-exercise" onchange="updateChart()" class="input-field mb-6 text-sm"></select>
            <div class="h-48 w-full"><canvas id="progressionChart" data-testid="chart-exercise-progression"></canvas></div>
        </div>
        <div class="glass p-6 mb-6">
            <h3 class="text-[10px] font-black text-indigo-400 mb-4 uppercase italic">Pomp Meter</h3>
            <div id="volumeTracker" data-testid="list-volume-bars" class="space-y-4 mb-10"></div>
            <h3 class="text-[10px] font-black text-emerald-400 mb-4 uppercase italic">Personal Records</h3>
            <div id="recordsTracker" data-testid="grid-pr-tiles" class="ex-grid pr-1"></div>
        </div>
    </section>

    <section id="view-profile" data-testid="view-profile" class="view-section hidden">
        <div class="glass p-6 mb-6">
            <input id="profName" data-testid="input-profile-name" class="input-field mb-6 text-xl" placeholder="JE NAAM" onchange="saveProfileName()">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-[8px] font-black opacity-40 uppercase">Trends</span>
                <div class="flex gap-1">
                    <button data-testid="btn-filter-weight-week" onclick="renderWeightChart(7)" class="filter-btn weight-f active">WEEK</button>
                    <button data-testid="btn-filter-weight-month" onclick="renderWeightChart(30)" class="filter-btn weight-f">MAAND</button>
                    <button data-testid="btn-filter-weight-year" onclick="renderWeightChart(365)" class="filter-btn weight-f">JAAR</button>
                </div>
            </div>
            <div class="h-40 w-full mb-8"><canvas id="weightChart" data-testid="chart-weight-trends"></canvas></div>
            <div class="flex gap-2 mb-6">
                <input id="profWeightInput" data-testid="input-log-weight" type="number" step="0.1" class="input-field flex-1" placeholder="KG">
                <input id="profFatInput" data-testid="input-log-fat" type="number" step="0.1" class="input-field flex-1" placeholder="VET %">
                <button data-testid="btn-submit-weight" onclick="logWeight()" class="btn-primary px-6 font-black italic">LOG</button>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button data-testid="btn-backup-export" onclick="exportData()" class="glass p-3 text-[9px] font-black uppercase">💾 Backup</button>
                <button data-testid="btn-backup-import" onclick="document.getElementById('importFile').click()" class="glass p-3 text-[9px] font-black uppercase">📂 Herstel</button>
                <input type="file" id="importFile" data-testid="input-file-import" class="hidden" onchange="importData(event)" accept=".json">
            </div>
            <div id="weightLogList" data-testid="list-weight-history" class="space-y-2 mb-8"></div>
        </div>
    </section>

    <nav data-testid="nav-main">
        <button data-testid="nav-item-training" onclick="showView('training')" class="text-center"><span class="block text-2xl">🏋️</span><span class="text-[10px] font-black">TRAIN</span></button>
        <button data-testid="nav-item-stats" onclick="showView('charts')" class="text-center"><span class="block text-2xl">📈</span><span class="text-[10px] font-black">STATS</span></button>
        <button data-testid="nav-item-profile" onclick="showView('profile')" class="text-center"><span class="block text-2xl">👤</span><span class="text-[10px] font-black">PROFIEL</span></button>
    </nav>

    <script>
        const INITIAL_LIB = { 
            "Borst": ["BENCH PRESS", "INCLINE DB PRESS", "PEC FLY", "DIPS", "PUSH UPS", "CABLE CROSSOVER"], 
            "Rug": ["LAT PULLDOWN", "DEADLIFT", "BENT OVER ROW", "PULL UPS", "SEATED CABLE ROW", "FACE PULLS", "T-BAR ROW"], 
            "Benen": ["SQUAT", "LEG PRESS", "LEG EXTENSION", "LEG CURL", "ROMANIAN DEADLIFT", "CALF RAISES", "LUNGES"], 
            "Schouders": ["OHP", "SIDE LATERAL RAISE", "FRONT RAISE", "DB SHOULDER PRESS", "REAR DELT FLY"], 
            "Triceps": ["CABLE PUSH DOWN", "SKULL CRUSHERS", "OVERHEAD EXTENSION", "CLOSE GRIP BENCH"], 
            "Armen": ["BICEP CURL", "HAMMER CURL", "PREACHER CURL", "CONCENTRATION CURL", "21S"], 
            "Buik / Core": ["PLANK", "CRUNCHES", "LEG RAISES", "RUSSIAN TWIST", "AB WHEEL"] 
        };
        const REP_DEFAULTS = [12, 10, 8, 6];
        let exLibrary = INITIAL_LIB, sessions = [], userData = { name: "GEBRUIKER", weightLogs: [] };
        let activeSessionId = null, chartInstance = null, weightChartInstance = null, radarChartInstance = null, drillDownChartInstance = null, currentTargetSessionId = null, pendingExName = "", swapExId = null, currentRadarDays = 7, activeMonths = new Set(), currentSelectedCat = "Borst";

        function init() { 
            sessions = JSON.parse(localStorage.getItem('gym_sessions')) || [];
            userData = JSON.parse(localStorage.getItem('gym_user')) || { name: "GEBRUIKER", weightLogs: [] };
            exLibrary = JSON.parse(localStorage.getItem('gym_ex_library')) || INITIAL_LIB;
            document.getElementById('newWorkoutDate').valueAsDate = new Date();
            document.getElementById('profName').value = userData.name || "";
            if (sessions.length > 0) {
                const latest = new Date(sessions[0].rawDate);
                activeMonths.add(`${latest.getFullYear()}-${latest.getMonth()}`);
            }
            saveAndRender(); 
        }

        function saveAndRender() { 
            localStorage.setItem('gym_sessions', JSON.stringify(sessions)); 
            localStorage.setItem('gym_user', JSON.stringify(userData)); 
            localStorage.setItem('gym_ex_library', JSON.stringify(exLibrary)); 
            updateHeader(); renderSessions(); renderWeightLogs(); populateExerciseSelect(); 
        }

        function calc1RM(w, r) {
            const weight = parseFloat(w);
            const reps = parseInt(r);
            if (!weight || !reps || reps < 1) return 0;
            if (reps === 1) return weight;
            return weight * (36 / (37 - reps));
        }
        
        function openExModal(sId) { 
            currentTargetSessionId = sId; 
            document.getElementById('exModal').classList.remove('hidden'); 
            renderExTabs();
            filterExLibrary(currentSelectedCat);
        }

        function closeExModal() { document.getElementById('exModal').classList.add('hidden'); }

        function renderExTabs() {
            const cont = document.getElementById('exCategoryScroll');
            cont.innerHTML = Object.keys(exLibrary).map(cat => `
                <button data-testid="tab-cat-${cat.toLowerCase()}" onclick="filterExLibrary('${cat}')" class="cat-tab ${cat === currentSelectedCat ? 'active' : ''}" id="tab-${cat}">
                    ${cat}
                </button>
            `).join('');
        }

        function filterExLibrary(cat) {
            currentSelectedCat = cat;
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${cat}`);
            if(activeTab) {
                activeTab.classList.add('active');
                activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
            const cont = document.getElementById('exLibraryList');
            const items = exLibrary[cat] || [];
            cont.innerHTML = items.sort().map(ex => `
                <div data-testid="ex-item-${ex.toLowerCase().replace(/\s/g, '-')}" onclick="selectEx('${ex}')" class="ex-item">
                    <span>${ex}</span>
                    <button data-testid="btn-delete-lib-ex-${ex.toLowerCase().replace(/\s/g, '-')}" onclick="event.stopPropagation(); if(confirm('Wissen?')){ exLibrary['${cat}']=exLibrary['${cat}'].filter(x=>x!=='${ex}'); saveAndRender(); filterExLibrary('${cat}'); }" class="text-rose-500 text-[8px] self-end opacity-40">WIS</button>
                </div>
            `).join('');
        }

        function selectEx(name) { 
            const sess = sessions.find(s => s.id === currentTargetSessionId); 
            if (swapExId) { 
                sess.exercises.find(e => e.id === swapExId).name = name.toUpperCase(); 
                swapExId = null; 
            } else { 
                sess.exercises.push({ id: Date.now(), name: name.toUpperCase(), sets: [{w:'', r:12, bpm:''}, {w:'', r:10, bpm:''}, {w:'', r:8, bpm:''}, {w:'', r:6, bpm:''}]}); 
            } 
            saveAndRender(); closeExModal(); 
        }

        function createNewSession() { 
            const name = (document.getElementById('newWorkoutName').value || "Training").toUpperCase(); 
            const raw = document.getElementById('newWorkoutDate').value; 
            const d = new Date(raw); 
            activeMonths.add(`${d.getFullYear()}-${d.getMonth()}`); 
            const newSess = { id: Date.now(), name, date: d.toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'short' }), rawDate: raw, exercises: [] };
            sessions.unshift(newSess); 
            activeSessionId = newSess.id; 
            saveAndRender(); 
        }

        function renderSessions() {
            const cont = document.getElementById('sessionContainer'); cont.innerHTML = "";
            const sorted = [...sessions].sort((a,b) => (new Date(b.rawDate) - new Date(a.rawDate)) || (b.id - a.id));
            const groups = {};
            sorted.forEach(s => {
                const d = new Date(s.rawDate); const key = `${d.getFullYear()}-${d.getMonth()}`;
                if (!groups[key]) groups[key] = { label: d.toLocaleDateString('nl-NL', { month: 'long', year: 'numeric' }).toUpperCase(), sessions: [] };

                const isOpen = activeMonths.has(key);
                cont.innerHTML += `<div data-testid="header-month-${key}" class="month-header" onclick="if(activeMonths.has('${key}')) activeMonths.delete('${key}'); else activeMonths.add('${key}'); renderSessions();">${groups[key].label} ${isOpen ? '▾' : '▸'}</div>`;
                if (isOpen) groups[key].sessions.forEach(session => {
                    cont.innerHTML += `<div data-testid="session-card-${session.id}" class="glass p-6 mb-4 ${activeSessionId === session.id ? 'border-indigo-500/40' : ''}">

                            <div class="text-[9px] font-black opacity-30 uppercase italic">${session.date}</div>
                        </div>
                        <div class="${activeSessionId === session.id ? 'mt-6' : 'hidden'}">
                            ${session.exercises.map((ex, exIdx) => `<div data-testid="session-ex-${ex.id}" class="mb-6 bg-white/5 p-4 rounded-xl">
                                <div class="flex justify-between mb-4"><button data-testid="btn-swap-ex-${ex.id}" onclick="swapExId=${ex.id}; openExModal(${session.id})" class="ex-name-btn text-[10px] font-black text-indigo-300 uppercase">${ex.name} ↻</button><button data-testid="btn-remove-ex-${ex.id}" onclick="const s=sessions.find(x=>x.id===${session.id}); s.exercises.splice(${exIdx},1); saveAndRender();" class="text-rose-500 text-[9px] font-black">WIS</button></div>
                                <div class="space-y-3">
                                    ${ex.sets.map((s, i) => {
                                        const orm = Math.round(calc1RM(s.w, s.r));
                                        return `<div data-testid="set-row-${ex.id}-${i}" class="grid grid-cols-5 gap-2 items-center">
                                            <div class="flex flex-col">
                                                <span class="text-[9px] opacity-20 font-bold">S${i+1}</span>
                                                <span data-testid="stat-live-1rm-${ex.id}-${i}" class="text-[7px] text-indigo-400 font-black">${orm > 0 ? orm + ' 1RM' : ''}</span>
                                            </div>
                                            <input data-testid="input-set-w-${ex.id}-${i}" type="text" onclick="this.select()" onchange="updSet(${session.id},${ex.id},${i},'w',this.value)" value="${s.w||''}" class="table-input" placeholder="kg">
                                            <input data-testid="input-set-r-${ex.id}-${i}" type="text" onclick="this.select()" onchange="updSet(${session.id},${ex.id},${i},'r',this.value)" value="${s.r||''}" class="table-input" placeholder="reps">
                                            <input data-testid="input-set-bpm-${ex.id}-${i}" type="text" onclick="this.select()" onchange="updSet(${session.id},${ex.id},${i},'bpm',this.value)" value="${s.bpm || ''}" class="table-input !text-rose-400" placeholder="bpm">
                                            <button data-testid="btn-remove-set-${ex.id}-${i}" onclick="const e=sessions.find(s=>s.id===${session.id}).exercises.find(x=>x.id===${ex.id}); e.sets.splice(${i},1); saveAndRender();" class="text-rose-500 font-bold text-xl">×</button>
                                        </div>`;
                                    }).join('')}
                                </div>
                                <button data-testid="btn-add-set-${ex.id}" onclick="addSet(${session.id}, ${ex.id})" class="w-full mt-4 py-2 border border-dashed border-white/10 rounded-lg text-[8px] font-black opacity-30 uppercase">+ Set</button>
                            </div>`).join('')}
                            <button data-testid="btn-add-ex-${session.id}" onclick="swapExId=null; openExModal(${session.id})" class="btn-primary w-full py-3 text-[10px] italic">+ Oefening</button>
                        </div>
                    </div>`;
                });
            });
        }
