<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GymLog Pro - v2.7.2</title>
    <link rel="icon" type="image/jpeg" href="IMG_2930.jpeg?v=12">
    <link rel="apple-touch-icon" href="IMG_2930.jpeg?v=12">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; --bg: #020617; }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; min-height: 100vh; overflow-x: hidden; }
        .view-section { padding-bottom: 140px !important; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; transition: all 0.2s ease; }
        button, .ex-item, .ex-name-btn, nav button, .glass { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s; cursor: pointer; }
        button:active, .ex-item:active, .ex-name-btn:active, nav button:active { transform: scale(0.96); opacity: 0.8; }
        .input-field { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 0.75rem; padding: 14px; width: 100%; color: white; font-weight: 700; outline: none; transition: all 0.2s; display: block; box-sizing: border-box; appearance: none; -webkit-appearance: none; }
        input[type="date"].input-field { min-height: 52px; line-height: 1.2; }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); border-radius: 1rem; font-weight: 800; text-transform: uppercase; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .table-input { background: #0f172a; width: 100%; font-weight: 800; font-size: 0.85rem; border-radius: 8px; padding: 8px; text-align: center; color: var(--accent); border: 1px solid rgba(255,255,255,0.1); }
        .action-btn { font-size: 9px; font-weight: 900; padding: 5px 10px; border-radius: 6px; text-transform: uppercase; border: 1px solid; }
        .btn-copy { color: #22c55e; border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .btn-share { color: #818cf8; border-color: #818cf8; background: rgba(129, 140, 248, 0.1); }
        .btn-delete { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        #exCategoryScroll { background: #0f172a; border-bottom: 1px solid rgba(99, 102, 241, 0.3); position: sticky; top: 0; z-index: 50; display: flex; gap: 8px; overflow-x: auto; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .cat-tab { padding: 12px 20px; border-radius: 14px; white-space: nowrap; font-size: 11px; font-weight: 900; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); background: #1e293b; }
        .cat-tab.active { background: var(--accent); color: white; border-color: #818cf8; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .ex-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .ex-item { background: #1e293b; padding: 16px; border-radius: 1rem; border: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; justify-content: space-between; min-height: 70px; font-size: 12px; font-weight: 800; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .record-tile { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 0.75rem; padding: 10px; display: flex; flex-direction: column; justify-content: center; }
        .filter-btn { font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 4px; background: rgba(255,255,255,0.05); transition: all 0.2s; }
        .filter-btn.active { background: var(--accent); box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4); }
        .heatmap-bar-fill { background: linear-gradient(90deg, #6366f1, #a855f7); height: 100%; transition: width 0.8s; }
        .hidden { display: none; }
        .reload-btn { background: rgba(255,255,255,0.05); border-radius: 0.5rem; padding: 4px 8px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); margin-left: 8px; }
        .month-header { font-size: 11px; font-weight: 900; color: #6366f1; letter-spacing: 1px; margin: 24px 0 12px 4px; display: flex; align-items: center; gap: 8px; opacity: 0.8; cursor: pointer; }
        .month-header::after { content: ''; height: 1px; background: linear-gradient(90deg, rgba(99,102,241,0.3), transparent); flex: 1; }
        
        /* Fixed Nav specifically targeting the jump bug */
        nav { position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; width: 100vw !important; height: 85px !important; z-index: 9999 !important; background: rgba(15, 23, 42, 0.95) !important; backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); transform: translateZ(0); }
        
        .overlay-nav { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); scrollbar-width: none; }
        .overlay-nav-btn { font-size: 7px; font-weight: 900; white-space: nowrap; padding: 6px 10px; border-radius: 6px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); text-transform: uppercase; }
        .overlay-nav-btn.active { background: var(--accent); color: white; }
        .edit-session-input { background: rgba(15, 23, 42, 0.9); border: 1px solid var(--accent); color: white; font-style: italic; font-weight: 900; text-transform: uppercase; outline: none; width: 100%; padding: 4px 8px; border-radius: 8px; }
        .order-btn { font-size: 14px; opacity: 0.3; padding: 0 4px; }
        .order-btn:hover { opacity: 1; color: var(--accent); }
        .record-cat-header { font-size: 8px; font-weight: 900; color: #10b981; text-transform: uppercase; letter-spacing: 1px; margin: 12px 0 6px 2px; opacity: 0.6; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">
    <header class="flex justify-between items-center mb-8 pt-4">
        <div class="flex items-center">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter inline-block">GYM<span class="text-indigo-500">LOG</span></h1>
                <span class="text-[10px] font-black opacity-20 ml-1">v2.7.2</span>
            </div>
            <button data-testid="btn-app-reload" onclick="location.reload(true)" class="reload-btn">↻</button>
        </div>
        <div id="headerStats" data-testid="stat-header-summary" class="glass px-4 py-2 text-[10px] font-bold border-indigo-500/30 text-indigo-100 uppercase italic">LOADING...</div>
    </header>

    <div id="exModal" data-testid="modal-exercise-library" class="hidden fixed inset-0 z-[100] bg-slate-950 flex flex-col">
        <div class="p-6 flex justify-between items-center bg-slate-950 border-b border-white/10">
            <h2 class="text-xl font-black italic text-white uppercase tracking-tighter">Choose <span class="text-indigo-500">Exercise</span></h2>
            <button data-testid="btn-close-ex-modal" onclick="closeExModal()" class="glass w-10 h-10 flex items-center justify-center text-rose-500 font-bold">✕</button>
        </div>
        <div id="exCategoryScroll" data-testid="list-exercise-categories" class="no-scrollbar"></div>
        <div class="flex-1 overflow-y-auto p-6 pb-40 bg-slate-950">
            <div id="exLibraryList" data-testid="grid-exercise-items" class="ex-grid"></div>
            <button data-testid="btn-start-custom-ex" onclick="startCustomEx()" class="btn-primary w-full py-4 mt-8 italic text-xs tracking-widest">+ CUSTOM EXERCISE</button>
        </div>
    </div>

    <div id="drillDownModal" data-testid="modal-drilldown" class="hidden fixed inset-0 z-[120] bg-slate-950/98 p-6 flex flex-col items-center justify-center">
        <div class="glass p-6 w-full max-w-sm relative flex flex-col">
            <button data-testid="btn-close-drilldown" onclick="document.getElementById('drillDownModal').classList.add('hidden')" class="absolute top-4 right-4 text-rose-500 font-bold z-10">✕</button>
            <h3 id="drillDownTitle" data-testid="label-drilldown-title" class="text-center font-black italic mb-4 text-indigo-400 uppercase">DETAILS</h3>
            <div id="drillDownNav" data-testid="nav-drilldown-categories" class="overlay-nav"></div>
            <div class="h-64 w-full"><canvas id="drillDownChart" data-testid="chart-drilldown"></canvas></div>
        </div>
    </div>

    <div id="catSelectorModal" data-testid="modal-category-link" class="hidden fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-6">
        <div class="glass p-6 w-full max-w-xs">
            <h3 class="text-center font-black italic mb-6 text-indigo-400 uppercase">Link to Muscle Group</h3>
            <div id="catBtnContainer" data-testid="list-category-links" class="grid grid-cols-1 gap-3"></div>
            <button data-testid="btn-cancel-cat-link" onclick="document.getElementById('catSelectorModal').classList.add('hidden')" class="w-full mt-6 text-[10px] font-bold opacity-40 uppercase">Cancel</button>
        </div>
    </div>

    <section id="view-training" data-testid="view-training" class="view-section">
        <div class="glass p-6 mb-8 border-indigo-500/20">
            <input id="newWorkoutName" data-testid="input-session-name" class="input-field mb-4" placeholder="WORKOUT NAME">
            <input id="newWorkoutDate" data-testid="input-session-date" type="date" class="input-field mb-6">
            <button data-testid="btn-create-session" onclick="createNewSession()" class="btn-primary w-full py-4 italic">Start Session</button>
        </div>
        <div id="sessionContainer" data-testid="container-sessions"></div>
    </section>

    <section id="view-charts" data-testid="view-charts" class="view-section hidden">
        <div id="statsCaptureArea" class="bg-[#020617] p-2 rounded-3xl">
            <div class="glass p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-black text-indigo-400 uppercase italic">Muscle Balance</h3>
                    <div class="flex gap-1" id="radarFilters">
                        <button data-testid="btn-filter-radar-week" onclick="renderRadarChart(7)" class="filter-btn active">WEEK</button>
                        <button data-testid="btn-filter-radar-month" onclick="renderRadarChart(30)" class="filter-btn">MONTH</button>
                        <button data-testid="btn-filter-radar-year" onclick="renderRadarChart(9999)" class="filter-btn">YEAR</button>
                    </div>
                </div>
                <div class="h-64 w-full"><canvas id="radarChart" data-testid="chart-radar-balance"></canvas></div>
            </div>
            <div class="glass p-6 mb-6">
                <h3 class="text-[10px] font-black text-indigo-400 mb-4 uppercase italic">Pump Meter</h3>
                <div id="volumeTracker" data-testid="list-volume-bars" class="space-y-4 mb-10"></div>
                <h3 class="text-[10px] font-black text-emerald-400 mb-4 uppercase italic">Personal Records</h3>
                <div id="recordsTracker" data-testid="grid-pr-tiles" class="flex flex-col gap-2"></div>
            </div>
        </div>
        <button data-testid="btn-share-stats" onclick="shareStatsImage()" class="btn-primary w-full py-4 mb-8 italic text-xs tracking-widest flex items-center justify-center gap-2">SHARE STATS 📸</button>
        <div class="glass p-6 mb-6">
            <select id="chartExerciseSelect" data-testid="select-chart-exercise" onchange="updateChart()" class="input-field mb-6 text-sm"></select>
            <div class="h-48 w-full"><canvas id="progressionChart" data-testid="chart-exercise-progression"></canvas></div>
        </div>
    </section>

    <section id="view-profile" data-testid="view-profile" class="view-section hidden">
        <div class="glass p-6 mb-6">
            <input id="profName" data-testid="input-profile-name" class="input-field mb-6 text-xl" placeholder="YOUR NAME" onchange="saveProfileName()">
            <div id="weightCaptureArea" class="bg-[#020617] p-2 rounded-2xl mb-4">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-[8px] font-black opacity-40 uppercase">Trends</span>
                    <div class="flex gap-1">
                        <button data-testid="btn-filter-weight-week" onclick="renderWeightChart(7)" class="filter-btn weight-f active">WEEK</button>
                        <button data-testid="btn-filter-weight-month" onclick="renderWeightChart(30)" class="filter-btn weight-f">MONTH</button>
                        <button data-testid="btn-filter-weight-year" onclick="renderWeightChart(365)" class="filter-btn weight-f">YEAR</button>
                    </div>
                </div>
                <div class="h-40 w-full mb-2"><canvas id="weightChart" data-testid="chart-weight-trends"></canvas></div>
            </div>
            <button data-testid="btn-share-weight-trends" onclick="shareWeightTrendsImage()" class="btn-primary w-full py-3 mb-6 italic text-[10px] tracking-widest flex items-center justify-center gap-2">SHARE TRENDS 📸</button>
            <div class="flex gap-2 mb-6">
                <input id="profWeightInput" data-testid="input-log-weight" type="number" step="0.1" class="input-field flex-1" placeholder="KG">
                <input id="profFatInput" data-testid="input-log-fat" type="number" step="0.1" class="input-field flex-1" placeholder="FAT %">
                <button data-testid="btn-submit-weight" onclick="logWeight()" class="btn-primary px-6 font-black italic">LOG</button>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button data-testid="btn-backup-export" onclick="exportData()" class="glass p-3 text-[9px] font-black uppercase">💾 Backup</button>
                <button data-testid="btn-backup-import" onclick="document.getElementById('importFile').click()" class="glass p-3 text-[9px] font-black uppercase">📂 Restore</button>
                <input type="file" id="importFile" data-testid="input-file-import" class="hidden" onchange="importData(event)" accept=".json">
            </div>
            <div id="weightLogList" data-testid="list-weight-history" class="space-y-2 mb-8"></div>
        </div>
    </section>

    <nav data-testid="nav-main">
        <button data-testid="nav-item-training" onclick="showView('training')" class="text-center"><span class="block text-2xl">🏋️</span><span class="text-[10px] font-black">TRAIN</span></button>
        <button data-testid="nav-item-stats" onclick="showView('charts')" class="text-center"><span class="block text-2xl">📈</span><span class="text-[10px] font-black">STATS</span></button>
        <button data-testid="nav-item-profile" onclick="showView('profile')" class="text-center"><span class="block text-2xl">👤</span><span class="text-[10px] font-black">PROFILE</span></button>
    </nav>

    <script>
        const INITIAL_LIB = { 
            "Chest": ["BENCH PRESS", "INCLINE DB PRESS", "PEC FLY", "DIPS", "PUSH UPS", "CABLE CROSSOVER"], 
            "Back": ["LAT PULLDOWN", "DEADLIFT", "BENT OVER ROW", "PULL UPS", "SEATED CABLE ROW", "FACE PULLS", "T-BAR ROW"], 
            "Legs": ["SQUAT", "LEG PRESS", "LEG EXTENSION", "LEG CURL", "ROMANIAN DEADLIFT", "CALF RAISES", "LUNGES"], 
            "Shoulders": ["OHP", "SIDE LATERAL RAISE", "FRONT RAISE", "DB SHOULDER PRESS", "REAR DELT FLY"], 
            "Triceps": ["CABLE PUSH DOWN", "SKULL CRUSHERS", "OVERHEAD EXTENSION", "CLOSE GRIP BENCH"], 
            "Arms": ["BICEP CURL", "HAMMER CURL", "PREACHER CURL", "CONCENTRATION CURL", "21S"], 
            "Abs / Core": ["PLANK", "CRUNCHES", "LEG RAISES", "RUSSIAN TWIST", "AB WHEEL"] 
        };
        const REP_DEFAULTS = [12, 10, 8, 6];
        let exLibrary = INITIAL_LIB, sessions = [], userData = { name: "USER", weightLogs: [] };
        let activeSessionIds = new Set(), openExIds = new Set(), editingSessionId = null, activeMonths = new Set();
        let chartInstance = null, weightChartInstance = null, radarChartInstance = null, drillDownChartInstance = null;
        let currentRadarDays = 7, currentTargetSessionId = null, swapExId = null, currentSelectedCat = "Chest", pendingExName = "";

        function init() { 
            const savedSessions = JSON.parse(localStorage.getItem('gym_sessions')) || [];
            const savedUser = JSON.parse(localStorage.getItem('gym_user')) || { name: "USER", weightLogs: [] };
            const savedLib = JSON.parse(localStorage.getItem('gym_ex_library'));

            const translationMap = {
                "Borst": "Chest", "Rug": "Back", "Benen": "Legs", "Schouders": "Shoulders", 
                "Triceps": "Triceps", "Armen": "Arms", "Buik / Core": "Abs / Core",
                "Göğüs": "Chest", "Sırt": "Back", "Bacak": "Legs", "Omuz": "Shoulders", 
                "Karın": "Abs / Core", "Arka Kol": "Triceps", "Ön Kol": "Arms"
            };

            if (savedLib) {
                exLibrary = {};
                Object.keys(savedLib).forEach(oldKey => {
                    const newKey = translationMap[oldKey] || oldKey;
                    exLibrary[newKey] = savedLib[oldKey];
                });
            } else { exLibrary = INITIAL_LIB; }

            sessions = savedSessions; userData = savedUser;
            document.getElementById('newWorkoutDate').valueAsDate = new Date();
            document.getElementById('profName').value = userData.name || "";
            if (sessions.length > 0) {
                const latest = new Date(sessions[0].rawDate);
                activeMonths.add(`${latest.getFullYear()}-${latest.getMonth()}`);
                activeSessionIds.add(sessions[0].id);
            }
            saveAndRender(); 
        }

        function saveAndRender() { 
            localStorage.setItem('gym_sessions', JSON.stringify(sessions)); 
            localStorage.setItem('gym_user', JSON.stringify(userData)); 
            localStorage.setItem('gym_ex_library', JSON.stringify(exLibrary)); 
            updateHeader(); renderSessions(); renderWeightLogs(); populateExerciseSelect(); 
        }

        function calc1RM(w, r) { const weight = parseFloat(w); const reps = parseInt(r); if (!weight || !reps || reps < 1) return 0; if (reps === 1) return weight; return weight * (36 / (37 - reps)); }
        function toggleSession(id) { if (activeSessionIds.has(id)) activeSessionIds.delete(id); else activeSessionIds.add(id); renderSessions(); }
        function toggleExSets(exId) { if (openExIds.has(exId)) openExIds.delete(exId); else openExIds.add(exId); renderSessions(); }

        function moveExercise(sessId, fromIdx, direction) {
            const sess = sessions.find(s => s.id === sessId);
            const toIdx = fromIdx + direction;
            if (toIdx < 0 || toIdx >= sess.exercises.length) return;
            const temp = sess.exercises[fromIdx]; sess.exercises[fromIdx] = sess.exercises[toIdx]; sess.exercises[toIdx] = temp;
            saveAndRender();
        }

        function editSessionName(id) {
            editingSessionId = id; renderSessions();
            setTimeout(() => { const input = document.getElementById(`edit-input-${id}`); if (input) { input.focus(); input.select(); } }, 50);
        }

        function saveSessionName(id, newName) {
            if (newName && newName.trim() !== "") {
                const s = sessions.find(x => x.id === id);
                if (s) s.name = newName.toUpperCase();
            }
            editingSessionId = null; saveAndRender();
        }

        function createNewSession() { 
            const name = (document.getElementById('newWorkoutName').value || "Training").toUpperCase(); 
            const raw = document.getElementById('newWorkoutDate').value; 
            const d = new Date(raw); activeMonths.add(`${d.getFullYear()}-${d.getMonth()}`); 
            const newSess = { id: Date.now(), name, date: d.toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'short' }), rawDate: raw, exercises: [] };
            sessions.unshift(newSess); activeSessionIds.add(newSess.id); saveAndRender(); 
        }

        function renderSessions() {
            const cont = document.getElementById('sessionContainer'); cont.innerHTML = "";
            const sorted = [...sessions].sort((a,b) => (new Date(b.rawDate) - new Date(a.rawDate)) || (b.id - a.id));
            const groups = {};
            sorted.forEach(s => {
                const d = new Date(s.rawDate); const key = `${d.getFullYear()}-${d.getMonth()}`;
                if (!groups[key]) groups[key] = { label: d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase(), sessions: [] };
                groups[key].sessions.push(s);
            });
            Object.keys(groups).forEach(key => {
                const isMonthOpen = activeMonths.has(key);
                cont.innerHTML += `<div class="month-header" onclick="if(activeMonths.has('${key}')) activeMonths.delete('${key}'); else activeMonths.add('${key}'); renderSessions();">${groups[key].label} ${isMonthOpen ? '▾' : '▸'}</div>`;
                if (isMonthOpen) groups[key].sessions.forEach(session => {
                    const isOpen = activeSessionIds.has(session.id);
                    const isEditing = editingSessionId === session.id;
                    cont.innerHTML += `<div data-testid="session-card-${session.id}" class="glass p-6 mb-4 ${isOpen ? 'border-indigo-500/40' : ''}">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex-1">
                                ${isEditing ? 
                                    `<input data-testid="input-edit-session-name-${session.id}" id="edit-input-${session.id}" class="edit-session-input" value="${session.name}" onblur="saveSessionName(${session.id}, this.value)" onkeydown="if(event.key==='Enter') saveSessionName(${session.id}, this.value)">` : 
                                    `<div class="flex items-center gap-2">
                                        <h3 class="text-xl font-black italic uppercase">${session.name}</h3>
                                        <button onclick="editSessionName(${session.id})" class="text-[14px] opacity-40 hover:opacity-100">✎</button>
                                    </div>`
                                }
                            </div>
                            <div class="flex gap-2">
                                <button onclick="cloneSession(${session.id})" class="action-btn btn-copy">Copy</button>
                                <button onclick="shareWorkout(${session.id})" class="action-btn btn-share">Share</button>
                                <button onclick="if(confirm('Delete?')){ sessions=sessions.filter(x=>x.id!==${session.id}); saveAndRender(); }" class="action-btn btn-delete">Del</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 mb-4 cursor-pointer" onclick="toggleSession(${session.id})">
                            <span class="text-indigo-400 font-black text-xs">${isOpen ? '▾' : '▸'}</span>
                            <span class="text-[9px] font-black opacity-30 uppercase italic tracking-widest">${session.date}</span>
                        </div>
                        <div class="${isOpen ? 'block' : 'hidden'} border-t border-white/5 pt-4">
                            ${session.exercises.map((ex, exIdx) => {
                                const isExOpen = openExIds.has(ex.id);
                                return `<div class="mb-4 bg-white/5 p-4 rounded-xl border border-white/5">
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-1">
                                        <button onclick="toggleExSets(${ex.id})" class="text-[10px] font-black text-indigo-300 uppercase flex items-center gap-2"><span class="text-xs">${isExOpen ? '▾' : '▸'}</span> ${ex.name}</button>
                                        <div class="flex ml-2">
                                            <button onclick="moveExercise(${session.id}, ${exIdx}, -1)" class="order-btn" data-testid="btn-move-up-${ex.id}">↑</button>
                                            <button onclick="moveExercise(${session.id}, ${exIdx}, 1)" class="order-btn" data-testid="btn-move-down-${ex.id}">↓</button>
                                        </div>
                                    </div>
                                    <div class="flex gap-4">
                                        <button onclick="swapExId=${ex.id}; openExModal(${session.id})" class="text-[9px] font-black opacity-30 uppercase tracking-tighter">SWAP</button>
                                        <button onclick="const s=sessions.find(x=>x.id===${session.id}); s.exercises.splice(${exIdx},1); saveAndRender();" class="text-rose-500 text-[9px] font-black uppercase tracking-tighter">DEL</button>
                                    </div>
                                </div>
                                <div class="${isExOpen ? 'mt-6 space-y-3' : 'hidden'}">
                                    ${ex.sets.map((s, i) => {
                                        const orm = Math.round(calc1RM(s.w, s.r));
                                        return `<div class="grid grid-cols-5 gap-2 items-center">
                                            <div class="flex flex-col">
                                                <span class="text-[9px] opacity-20 font-bold">S${i+1}</span>
                                                <span class="text-[7px] text-indigo-400 font-black">${orm > 0 ? orm + ' 1RM' : ''}</span>
                                            </div>
                                            <input type="text" inputmode="decimal" onclick="this.select()" onchange="updSet(${session.id},${ex.id},${i},'w',this.value)" value="${s.w||''}" class="table-input" placeholder="kg">
                                            <input type="text" inputmode="numeric" onclick="this.select()" onchange="updSet(${session.id},${ex.id},${i},'r',this.value)" value="${s.r||''}" class="table-input" placeholder="reps">
                                            <input type="text" inputmode="numeric" onclick="this.select()" onchange="updSet(${session.id},${ex.id},${i},'bpm',this.value)" value="${s.bpm || ''}" class="table-input !text-rose-400" placeholder="bpm">
                                            <button onclick="const e=sessions.find(s=>s.id===${session.id}).exercises.find(x=>x.id===${ex.id}); e.sets.splice(${i},1); saveAndRender();" class="text-rose-500 font-bold text-xl">×</button>
                                        </div>`;
                                    }).join('')}
                                    <button onclick="addSet(${session.id}, ${ex.id})" class="w-full mt-4 py-2 border border-dashed border-white/10 rounded-lg text-[8px] font-black opacity-30 uppercase">+ Set</button>
                                </div>
                            </div>`}).join('')}
                            <button onclick="swapExId=null; openExModal(${session.id})" class="btn-primary w-full py-3 text-[10px] italic">+ Exercise</button>
                        </div>
                    </div>`;
                });
            });
        }

        function renderCharts() { 
            updateChart(); renderRadarChart(currentRadarDays); 
            const volCont = document.getElementById('volumeTracker'); const recCont = document.getElementById('recordsTracker'); 
            volCont.innerHTML = ""; recCont.innerHTML = ""; 
            let volPerCat = {}; let exToCat = {}; let records = {}; let best1RM = {};
            for (const [cat, exs] of Object.entries(exLibrary)) { volPerCat[cat] = 0; exs.forEach(e => exToCat[e.toUpperCase()] = cat); } 
            volPerCat["OTHER"] = 0; const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7); 
            sessions.forEach(s => { 
                const isRecent = new Date(s.rawDate) >= sevenDaysAgo; 
                s.exercises.forEach(ex => { 
                    const n = ex.name.toUpperCase(); const cat = exToCat[n] || "OTHER"; let maxW = 0; 
                    ex.sets.forEach(st => { 
                        const weight = parseFloat(st.w) || 0; const reps = parseInt(st.r) || 0; const orm = calc1RM(weight, reps);
                        if (isRecent) volPerCat[cat] += (weight * reps); 
                        if (weight > maxW) maxW = weight; 
                        if (!best1RM[n] || orm > best1RM[n]) best1RM[n] = orm;
                    }); 
                    if (!records[n] || maxW > records[n]) records[n] = maxW; 
                }); 
            }); 
            const maxVol = Math.max(...Object.values(volPerCat), 1); 
            Object.entries(volPerCat).sort((a,b)=>b[1]-a[1]).forEach(([c, v]) => { 
                if (v > 0 || c !== "OTHER") volCont.innerHTML += `<div><div class="flex justify-between text-[8px] font-black uppercase"><span>${c}</span><span>${v.toLocaleString()} KG</span></div><div class="bg-slate-900 rounded-full h-2 mt-1 overflow-hidden"><div class="heatmap-bar-fill" style="width: ${Math.round((v/maxVol)*100)}%"></div></div></div>`; 
            }); 
            const catsWithRecords = {};
            Object.entries(records).forEach(([name, val]) => {
                const cat = exToCat[name] || "OTHER";
                if(!catsWithRecords[cat]) catsWithRecords[cat] = [];
                catsWithRecords[cat].push({ name, val, orm: Math.round(best1RM[name] || 0) });
            });
            Object.keys(catsWithRecords).sort().forEach(cat => {
                recCont.innerHTML += `<div class="record-cat-header">${cat}</div>`;
                const grid = document.createElement('div'); grid.className = "ex-grid";
                catsWithRecords[cat].sort((a,b) => a.name.localeCompare(b.name)).forEach(rec => {
                    grid.innerHTML += `<div class="record-tile"><span class="text-[8px] font-black uppercase opacity-40 mb-1 truncate">${rec.name}</span><span class="text-[13px] font-black text-emerald-400">${rec.val}<span class="text-[8px] ml-0.5">KG</span></span>${rec.orm > 0 ? `<span class="text-[7px] font-bold text-indigo-400 mt-1 uppercase italic">${rec.orm}KG EST. 1RM</span>` : ''}</div>`;
                });
                recCont.appendChild(grid);
            });
        }

        function renderRadarChart(days = 7) {
            currentRadarDays = days; const ctx = document.getElementById('radarChart'); if(!ctx) return;
            document.querySelectorAll('#radarFilters .filter-btn').forEach(b => { b.classList.remove('active'); if(b.getAttribute('onclick').includes(days)) b.classList.add('active'); });
            const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
            const categories = Object.keys(exLibrary);
            let exToCat = {}; Object.entries(exLibrary).forEach(([cat, exs]) => exs.forEach(e => exToCat[e.toUpperCase()] = cat));
            let dataMap = {}; categories.forEach(cat => dataMap[cat] = 0);
            sessions.forEach(s => { if (new Date(s.rawDate) >= cutoff) { s.exercises.forEach(ex => { const cat = exToCat[ex.name.toUpperCase()]; if (cat && dataMap.hasOwnProperty(cat)) { ex.sets.forEach(set => { dataMap[cat] += (parseFloat(set.w) || 0) * (parseInt(set.r) || 0); }); } }); } });
            if(radarChartInstance) radarChartInstance.destroy();
            radarChartInstance = new Chart(ctx, { type: 'radar', data: { labels: categories, datasets: [{ data: categories.map(c => dataMap[c]), backgroundColor: 'rgba(99, 102, 241, 0.25)', borderColor: '#6366f1', pointBackgroundColor: '#6366f1', borderWidth: 3, pointRadius: 4 }] }, options: { maintainAspectRatio: false, onClick: (e, elements) => { if(elements.length > 0) showDrillDown(categories[elements[0].index]); }, scales: { r: { beginAtZero: true, angleLines: { color: 'rgba(255,255,255,0.1)' }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: 'rgba(255,255,255,0.6)', font: { size: 10, weight: '900' } }, ticks: { display: false } } }, plugins: { legend: { display: false } } } });
        }

        function showDrillDown(category) { 
            const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - currentRadarDays); 
            let drillData = {}; 
            sessions.forEach(s => { if (new Date(s.rawDate) >= cutoff) { s.exercises.forEach(ex => { if ((exLibrary[category] || []).includes(ex.name.toUpperCase())) { if (!drillData[ex.name]) drillData[ex.name] = 0; ex.sets.forEach(set => { drillData[ex.name] += (parseFloat(set.w) || 0) * (parseInt(set.r) || 0); }); } }); } }); 
            const nav = document.getElementById('drillDownNav'); nav.innerHTML = ""; 
            Object.keys(exLibrary).forEach(cat => { const b = document.createElement('button'); b.className = `overlay-nav-btn ${cat === category ? 'active' : ''}`; b.innerText = cat; b.onclick = () => showDrillDown(cat); nav.appendChild(b); }); 
            document.getElementById('drillDownTitle').innerText = category; document.getElementById('drillDownModal').classList.remove('hidden'); 
            if(drillDownChartInstance) drillDownChartInstance.destroy(); 
            drillDownChartInstance = new Chart(document.getElementById('drillDownChart'), { type: 'bar', data: { labels: Object.keys(drillData), datasets: [{ data: Object.values(drillData), backgroundColor: '#6366f1' }] }, options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { display: false }, ticks: { color: '#fff', font: { size: 9, weight: 'bold' } } } } } }); 
        }

        function updateChart() {
            const ctx = document.getElementById('progressionChart'); if(!ctx) return;
            const name = document.getElementById('chartExerciseSelect').value; if(!name) return;
            const relevant = sessions.filter(s => s.exercises.some(e => e.name.toUpperCase() === name)).sort((a,b) => new Date(a.rawDate) - new Date(b.rawDate));
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'line', data: { labels: relevant.map(s => s.rawDate), datasets: [{ data: relevant.map(s => Math.max(...s.exercises.find(e => e.name.toUpperCase() === name).sets.map(st => parseFloat(st.w) || 0))), borderColor: '#6366f1', tension: 0.3 }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }

        function renderWeightChart(days = 30) {
            const ctx = document.getElementById('weightChart'); if(!ctx) return;
            document.querySelectorAll('.weight-f').forEach(b => { b.classList.remove('active'); if(b.getAttribute('onclick').includes(days)) b.classList.add('active'); });
            const logs = (userData.weightLogs || []).slice(0, days).reverse();
            if(weightChartInstance) weightChartInstance.destroy();
            weightChartInstance = new Chart(ctx, { type: 'line', data: { labels: logs.map(l => new Date(l.date).toLocaleDateString('en-US', {day:'numeric', month:'short'})), datasets: [ { label: 'KG', data: logs.map(l => l.w), borderColor: '#6366f1', tension: 0.4, yAxisID: 'y' }, { label: 'FAT %', data: logs.map(l => l.fat), borderColor: '#10b981', borderDash: [5,5], yAxisID: 'y1' } ] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: true, position: 'left', grid: { color: 'rgba(255,255,255,0.05)' } }, y1: { display: true, position: 'right', grid: { display: false } } } } });
        }

        async function shareStatsImage() {
            const btn = document.querySelector('[data-testid="btn-share-stats"]'); const originalText = btn.innerText; btn.innerText = "GENERATING...";
            try {
                const canvas = await html2canvas(document.getElementById('statsCaptureArea'), { backgroundColor: '#020617', scale: 2, logging: false });
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'gymlog_stats.png', { type: 'image/png' });
                    if (navigator.share && navigator.canShare({ files: [file] })) await navigator.share({ files: [file], title: 'My GymLog Stats' });
                    else { const link = document.createElement('a'); link.download = 'gymlog_stats.png'; link.href = canvas.toDataURL(); link.click(); }
                    btn.innerText = originalText;
                });
            } catch (err) { btn.innerText = originalText; }
        }

        async function shareWeightTrendsImage() {
            const btn = document.querySelector('[data-testid="btn-share-weight-trends"]'); const originalText = btn.innerText; btn.innerText = "GENERATING...";
            try {
                const canvas = await html2canvas(document.getElementById('weightCaptureArea'), { backgroundColor: '#020617', scale: 2, logging: false });
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'gymlog_trends.png', { type: 'image/png' });
                    if (navigator.share && navigator.canShare({ files: [file] })) await navigator.share({ files: [file], title: 'My Weight Trends' });
                    else { const link = document.createElement('a'); link.download = 'gymlog_trends.png'; link.href = canvas.toDataURL(); link.click(); }
                    btn.innerText = originalText;
                });
            } catch (err) { btn.innerText = originalText; }
        }

        async function shareWorkout(id) {
            const s = sessions.find(x => x.id === id);
            const text = `GymLog - ${s.name} (${s.date})\n${s.exercises.map(ex => `\n${ex.name}:${ex.sets.map(st => `\n- ${st.w}kg x ${st.r}`).join('')}`).join('\n')}`;
            if (navigator.share) await navigator.share({ title: 'My Training', text });
            else { navigator.clipboard.writeText(text); alert("Copied!"); }
        }

        function populateExerciseSelect() { const u = [...new Set(sessions.flatMap(s => s.exercises.map(e => e.name.toUpperCase())))].sort(); document.getElementById('chartExerciseSelect').innerHTML = u.map(n => `<option value="${n}">${n}</option>`).join(''); }
        function saveProfileName() { userData.name = document.getElementById('profName').value.toUpperCase(); saveAndRender(); }
        function showView(v) { document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden')); document.getElementById('view-'+v).classList.remove('hidden'); if(v==='charts') renderCharts(); if(v==='profile') renderWeightChart(30); }
        function updateHeader() { const logs = userData.weightLogs || []; const lastW = (logs.length > 0) ? logs[0].w : "--"; document.getElementById('headerStats').innerText = `${userData.name || "GYMLOG"} • ${lastW} KG`; }
        function renderWeightLogs() { const logs = (userData.weightLogs || []).slice(0,10); document.getElementById('weightLogList').innerHTML = logs.map((l, i) => `<div class="flex justify-between items-center text-[10px] font-bold p-3 bg-white/5 rounded-xl mb-1 border border-white/5"><div><span class="text-indigo-400 font-black">${l.w} KG</span>${l.fat ? `<span class="text-emerald-400 ml-2 italic">${l.fat}% FAT</span>` : ''}</div><div class="flex gap-3 items-center"><span class="opacity-40 uppercase text-[8px]">${new Date(l.date).toLocaleDateString('en-US', {day:'2-digit', month:'2-digit'})}</span><button onclick="userData.weightLogs.splice(${i},1); saveAndRender();" class="text-rose-500">✕</button></div></div>`).join(''); }
        function logWeight() { const w = document.getElementById('profWeightInput').value; const fat = document.getElementById('profFatInput').value; if(w){ userData.weightLogs.unshift({ w: parseFloat(w), fat: fat ? parseFloat(fat) : null, date: new Date().toISOString() }); saveAndRender(); document.getElementById('profWeightInput').value = ""; document.getElementById('profFatInput').value = ""; renderWeightChart(30); } }
        function exportData() { const blob = new Blob([JSON.stringify({ sessions, exLibrary, user: userData })], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `gymlog_backup.json`; a.click(); }
        
        // BUG FIX: Navigation Jump Fix
        function importData(e) { 
            const reader = new FileReader(); 
            reader.onload = (ev) => { 
                try { 
                    const imp = JSON.parse(ev.target.result); 
                    if (imp.sessions) sessions = imp.sessions; 
                    if (imp.exLibrary) exLibrary = imp.exLibrary; 
                    if (imp.user) userData = imp.user; 
                    
                    // Force final save before reload
                    localStorage.setItem('gym_sessions', JSON.stringify(sessions)); 
                    localStorage.setItem('gym_user', JSON.stringify(userData)); 
                    localStorage.setItem('gym_ex_library', JSON.stringify(exLibrary));
                    
                    // Short delay to allow layout stability before reload
                    setTimeout(() => { location.reload(true); }, 150);
                } catch (err) { alert("Invalid file."); } 
            }; 
            reader.readAsText(e.target.files[0]); 
        }

        function cloneSession(id) { const old = sessions.find(s => s.id === id); const today = new Date(); const news = { id: Date.now(), name: old.name, date: today.toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'short' }), rawDate: today.toISOString().split('T')[0], exercises: old.exercises.map(ex => ({ id: Date.now() + Math.random(), name: ex.name, sets: ex.sets.map(s => ({ w: s.w, r: s.r, bpm: '' })) })) }; sessions.unshift(news); activeSessionIds.add(news.id); saveAndRender(); }
        function updSet(sId, eId, i, f, v) { const s = sessions.find(x => x.id === sId); if(s) { const e = s.exercises.find(ex => ex.id === eId); if(e) { e.sets[i][f] = v; localStorage.setItem('gym_sessions', JSON.stringify(sessions)); } } }
        function addSet(sId, exId) { const s = sessions.find(x => x.id === sId); const e = s.exercises.find(ex => ex.id === exId); e.sets.push({w:'', r:REP_DEFAULTS[e.sets.length] || 6, bpm:''}); saveAndRender(); }
        function openExModal(sId) { currentTargetSessionId = sId; document.getElementById('exModal').classList.remove('hidden'); renderExTabs(); filterExLibrary(currentSelectedCat); }
        function closeExModal() { document.getElementById('exModal').classList.add('hidden'); }
        function renderExTabs() { const cont = document.getElementById('exCategoryScroll'); cont.innerHTML = Object.keys(exLibrary).map(cat => `<button onclick="filterExLibrary('${cat}')" class="cat-tab ${cat === currentSelectedCat ? 'active' : ''}" id="tab-${cat}">${cat}</button>`).join(''); }
        function filterExLibrary(cat) { currentSelectedCat = cat; document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active')); const activeTab = document.getElementById(`tab-${cat}`); if(activeTab) activeTab.classList.add('active'); const cont = document.getElementById('exLibraryList'); const items = exLibrary[cat] || []; cont.innerHTML = items.sort().map(ex => `<div onclick="selectEx('${ex}')" class="ex-item"><span>${ex}</span><button onclick="event.stopPropagation(); if(confirm('Delete?')){ exLibrary['${cat}']=exLibrary['${cat}'].filter(x=>x!=='${ex}'); saveAndRender(); filterExLibrary('${cat}'); }" class="text-rose-500 text-[8px] self-end opacity-40">DEL</button></div>`).join(''); }
        function selectEx(name) { const sess = sessions.find(s => s.id === currentTargetSessionId); const newExId = Date.now(); sess.exercises.push({ id: newExId, name: name.toUpperCase(), sets: [{w:'', r:12, bpm:''}, {w:'', r:10, bpm:''}, {w:'', r:8, bpm:''}, {w:'', r:6, bpm:''}]}); openExIds.add(newExId); saveAndRender(); closeExModal(); }
        function startCustomEx() { const n = prompt("Exercise Name:"); if(!n) return; const pendingExName = n.toUpperCase(); const btnCont = document.getElementById('catBtnContainer'); btnCont.innerHTML = ""; Object.keys(exLibrary).forEach(cat => { const b = document.createElement('button'); b.className = "glass p-4 text-[10px] font-black uppercase"; b.innerText = cat; b.onclick = () => { if(!exLibrary[cat].includes(pendingExName)) exLibrary[cat].push(pendingExName); document.getElementById('catSelectorModal').classList.add('hidden'); saveAndRender(); filterExLibrary(cat); }; btnCont.appendChild(b); }); document.getElementById('catSelectorModal').classList.remove('hidden'); }

        init();
    </script>
</body>
